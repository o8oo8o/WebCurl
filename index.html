                tab.response.statusText = 'OK';
                tab.response.contentType = 'text/event-stream';
                tab.response.duration = null; // 连接中，无持续时间
            }

            // 只有在同一个Tab时才更新界面
            if (RequestTabManager.activeTabId === currentTabId) {
                const responseBody = byId('responseBody');
                if (responseBody) responseBody.value = '';

                const responseInfo = byId('responseInfo');
                if (responseInfo) {
                    responseInfo.innerHTML = `
                        状态码: 200 OK<br>
                        响应时间: 持续连接中<br>
                        内容类型: text/event-stream<br>
                    `;
                    responseInfo.className = 'response-info httpStatus2';
                    responseInfo.dataset.status = '200';
                    responseInfo.dataset.statusText = 'OK';
                    responseInfo.dataset.duration = '';
                    responseInfo.dataset.contentType = 'text/event-stream';
                }
            }
            saveRequestToHistory();

            // 监听x-web-curl-headers事件，专门处理响应头
            es.addEventListener('x-web-curl-headers', function (e) {
                try {
                    const obj = JSON.parse(e.data);
                    // 【关键】保存响应头到发起请求的Tab
                    const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                    if (tab) {
                        tab.response.headers = obj;
                    }
                    // 只有在同一个Tab时才更新界面
                    if (RequestTabManager.activeTabId === currentTabId) {
                        updateWSResponseHeaders(obj);
                    }
                } catch (err) {
                    console.warn('解析SSE响应头失败:', err);
                }
            });

            es.onmessage = function (e) {
                // 获取当前Tab并更新响应体
                const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);

                // 只有在同一个Tab时才更新界面
                if (RequestTabManager.activeTabId === currentTabId) {
                    const responseBody = byId('responseBody');
                    if (responseBody) {
                        responseBody.value += `[message] ${e.data || ''}\n`;

                        // 同步更新Tab的响应体
                        if (tab && tab.response) {
                            tab.response.body = responseBody.value || '';
                        }
                    }
                } else {
                    // 不在当前Tab时，只更新Tab的响应体，不更新界面
                    if (tab && tab.response) {
                        tab.response.body = (tab.response.body || '') + `[message] ${e.data || ''}\n`;
                    }
                }
            };

            // 注册用户配置的SSE事件类型监听器
            const settings = getRequestSettings();
            if (settings.sse_event_types) {
                const sseEventTypeList = settings.sse_event_types.split(',').map(type => type.trim()).filter(type => type);
                sseEventTypeList.forEach(type => {
                    if (type && type !== 'message' && type !== 'x-web-curl-headers') {
                        es.addEventListener(type, function (e) {
                            // 获取当前Tab并更新响应体
                            const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);

                            // 只有在同一个Tab时才更新界面
                            if (RequestTabManager.activeTabId === currentTabId) {
                                const responseBody = byId('responseBody');
                                if (responseBody) {
                                    responseBody.value += `[${type}] ${e.data || ''}\n`;

                                    // 同步更新Tab的响应体
                                    if (tab && tab.response) {
                                        tab.response.body = responseBody.value || '';
                                    }
                                }
                            } else {
                                // 不在当前Tab时，只更新Tab的响应体，不更新界面
                                if (tab && tab.response) {
                                    tab.response.body = (tab.response.body || '') + `[${type}] ${e.data || ''}\n`;
                                }
                            }
                        });
                    }
                });
            }

            es.onerror = function (e) {
                // 计算连接持续时间
                const duration = Date.now() - connectionStartTime;
                // 【关键】先更新Tab的响应数据
                const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                if (tab) {
                    tab.response.statusText = '流式响应已结束';
                    tab.response.duration = duration;
                }
                // 只有在同一个Tab时才更新界面
                if (RequestTabManager.activeTabId === currentTabId) {
                    const responseInfo = byId('responseInfo');
                    if (responseInfo) {
                        responseInfo.innerHTML = `
                            状态码: 200 流式响应已结束<br>
                            响应时间: ${duration}ms<br>
                            内容类型: text/event-stream<br>
                        `;
                    }
                }
                es.close();
                // 清除发起请求的Tab的sse引用
                if (tab && tab.sse === es) {
                    tab.sse = null;
                }
            };
        }

        /**
         * 更新WebSocket/SSE响应头
         * @param {Object} headers - 响应头对象
         */
        function updateWSResponseHeaders(headers) {
            const responseHeadersTable = byId('responseHeaders')?.getElementsByTagName('tbody')[0];
            if (!responseHeadersTable) return;

            responseHeadersTable.innerHTML = '';
            for (const [key, values] of Object.entries(headers)) {
                const row = responseHeadersTable.insertRow();
                row.insertCell(0).textContent = key;
                row.insertCell(1).textContent = Array.isArray(values) ? values.join(', ') : values;
            }
        }

        /**
         * 设置Content-Type并获取请求体
         * @param {Object} headers - 请求头对象
         * @param {string} bodyType - 请求体类型
         * @param {Object} requestOptions - 请求选项
         * @returns {Promise<void>}
         */
        async function setContentTypeAndBody(headers, bodyType, requestOptions, requestBody) {
            switch (bodyType) {
                case 'form':
                    headers['Content-Type'] = 'application/x-www-form-urlencoded';
                    break;
                case 'json':
                    headers['Content-Type'] = 'application/json';
                    break;
                case 'text':
                    const customContentType = headers['Content-Type'];
                    if (customContentType && customContentType.startsWith('text/')) {
                        headers['Content-Type'] = customContentType;
                    } else {
                        headers['Content-Type'] = 'text/plain';
                    }
                    break;
                case 'binary':
                    headers['Content-Type'] = 'application/octet-stream';
                    break;
            }

            if (requestBody !== undefined && requestBody !== null) {
                requestOptions.body = requestBody;
            } else {
                requestOptions.body = await getRequestBody(bodyType);
            }
        }

        /**
         * 绑定WebSocket按钮事件
         * @param {WebSocket} ws - WebSocket实例
         */
        function bindWSButtons(ws) {
            const wsSendBtn = byId('wsSendBtn');
            const wsCloseBtn = byId('wsCloseBtn');
            const wsSendInput = byId('wsSendInput');

            if (wsSendBtn) {
                wsSendBtn.onclick = function () {
                    const msg = wsSendInput?.value || '';
                    if (ws && ws.readyState === 1) {
                        try {
                            ws.send(msg);
                        } catch (err) {
                            console.error('发送WS消息失败:', err);
                        }
                    }
                };
            }

            if (wsCloseBtn) {
                wsCloseBtn.onclick = function () {
                    if (ws && ws.readyState === 1) {
                        try {
                            ws.close();
                        } catch (err) {
                            console.error('关闭WS连接失败:', err);
                        }
                    }
                };
            }
        }

        /**
         * 获取请求体内容
         * 根据请求体类型获取对应的请求体数据
         * @param {string} bodyType - 请求体类型
         * @returns {Promise<string|FormData|ArrayBuffer|null>} 请求体数据，根据类型返回不同格式
         * @throws {Error} 当JSON格式不正确或未选择文件时抛出错误
         */
        async function getRequestBody(bodyType) {
            const getSelectedRow = (selector) => {
                const row = document.querySelector(selector);
                if (!row) {
                    throw new Error(`请选择一个${bodyType}请求体`);
                }
                return row;
            };

            switch (bodyType) {
                case 'json': {
                    try {
                        const selectedRow = getSelectedRow('#jsonBodyRows input[type="radio"]:checked');
                        const jsonText = selectedRow.closest('.body-row').querySelector('textarea')?.value || '';
                        // 验证JSON格式的合法性
                        JSON.parse(jsonText);
                        return jsonText;
                    } catch (e) {
                        throw new Error(`JSON格式不正确: ${e.message}`);
                    }
                }
                case 'text': {
                    const selectedTextRow = getSelectedRow('#textBodyRows input[type="radio"]:checked');
                    return selectedTextRow.closest('.body-row').querySelector('textarea')?.value || '';
                }
                case 'binary': {
                    const selectedBinaryRow = getSelectedRow('#binaryBodyRows input[type="radio"]:checked');
                    const fileInput = selectedBinaryRow.closest('.body-row').querySelector('input[type="file"]');
                    if (!fileInput?.files.length) {
                        throw new Error('请选择要上传的文件');
                    }
                    return await fileInput.files[0].arrayBuffer();
                }
                case 'form': {
                    const formData = new URLSearchParams();
                    docSelectAll('#formRows .header-row').forEach((row) => {
                        const inputs = row.getElementsByTagName('input');
                        const isEnabled = inputs[0]?.checked;
                        const key = inputs[1]?.value;
                        if (isEnabled && key) {
                            formData.append(key, inputs[2]?.value || '');
                        }
                    });
                    return formData.toString();
                }
                case 'formdata': {
                    const multipartFormData = new FormData();
                    const formDataRows = docSelectAll('.formdata-row');
                    for (const row of formDataRows) {
                        const isEnabled = row.querySelector('input[type="checkbox"]')?.checked;
                        if (!isEnabled) continue;

                        const key = row.querySelector('.formdata-key')?.value;
                        const type = row.querySelector('.formdata-type')?.value;
                        if (!key) continue;

                        if (type === 'text') {
                            const value = row.querySelector('.text-input')?.value || '';
                            multipartFormData.append(key, value);
                        } else if (type === 'file') {
                            const fileInput = row.querySelector('.file-input');
                            if (fileInput?.files.length > 0) {
                                for (const file of fileInput.files) {
                                    multipartFormData.append(key, file);
                                }
                            } else {
                                multipartFormData.append(key, '');
                            }
                        }
                    }
                    return multipartFormData;
                }
                default:
                    return null;
            }
        }

        /**
         * 处理下载类型的HTTP响应
         * 将响应内容保存为文件并在页面上显示相关信息
         * @param {Response} response - fetch API 的响应对象
         * @param {string} contentType - 响应内容类型
         * @returns {Promise<void>}
         * @throws {Error} 当HTTP响应状态不是ok时抛出
         */
        async function handleDownloadResponse(response, contentType) {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            // 提取文件名
            let filename = '';
            const contentDisposition = response.headers.get('content-disposition');
            if (contentDisposition?.includes('filename=')) {
                const filenameMatch = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                if (filenameMatch?.[1]) {
                    filename = filenameMatch[1].replace(/['"]/g, '');
                    try {
                        filename = decodeURIComponent(filename);
                    } catch (e) {
                        console.warn('文件名解码失败:', e);
                    }
                }
            }

            if (!filename) {
                const extension = contentType?.split('/').pop()?.split(';')[0] || 'txt';
                filename = `downloaded_file.${extension}`;
            }

            const blob = await response.blob();
            const downloadUrl = URL.createObjectURL(blob);

            // 使用现代下载方式
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = filename;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(downloadUrl);
            document.body.removeChild(a);

            const responseInfo = byId('responseInfo');
            const responseBody = byId('responseBody');

            if (responseInfo) {
                responseInfo.innerHTML = `
                    状态码: ${response.status} ${response.statusText}<br>
                    文件名: ${filename}<br>
                    文件大小: ${(blob.size / 1024).toFixed(2)} KB<br>
                    内容类型: ${contentType || '未指定'}<br>
                `;
                responseInfo.classList = 'response-info httpStatus' + (response.status + "").substr(0, 1);
            }

            if (responseBody) {
                responseBody.value = '[二进制文件内容已下载]';
            }
        }

        /**
         * 重置JSON格式化状态
         * 隐藏格式化容器和按钮，显示原始响应内容
         */
        function resetJsonFormatState() {
            const elements = {
                container: byId('jsonFormattedContainer'),
                textarea: byId('responseBody'),
                formatBtn: byId('formatJsonBtn'),
                copyBtn: byId('copyFormattedBtn')
            };

            if (elements.container) elements.container.style.display = 'none';
            if (elements.textarea) elements.textarea.style.display = 'block';
            if (elements.formatBtn) elements.formatBtn.style.display = 'none';
            if (elements.copyBtn) elements.copyBtn.style.display = 'none';

            isJsonFormatted = false;
        }

        /**
         * 显示JSON格式化按钮
         * 当检测到响应为JSON格式时显示格式化按钮
         */
        function showJsonFormatButton() {
            const formatJsonBtn = byId('formatJsonBtn');
            if (formatJsonBtn) {
                formatJsonBtn.style.display = 'inline-block';
            }
        }

        /**
         * 请求Tab管理器
         * 管理多Tab请求页面的创建、切换、关闭等功能
         */
        const RequestTabManager = {
            /** @type {Array<{id: string, name: string, method: string, data: Object}>} Tab列表 */
            tabs: [],
            /** @type {string|null} 当前激活的Tab ID */
            activeTabId: null,
            /** @type {number} Tab计数器，用于生成唯一ID */
            tabCounter: 0,
            /** @type {string} localStorage存储键 */
            STORAGE_KEY: 'request_tabs',

            /**
             * 初始化Tab管理器
             * 从localStorage加载已保存的Tab，如果没有则创建默认Tab
             * 注意：localStorage只保存基本信息，需要补充运行时字段
             */
            init() {
                const savedTabs = StorageManager.get(this.STORAGE_KEY, null);
                if (savedTabs && savedTabs.tabs && savedTabs.tabs.length > 0) {
                    // 加载保存的Tab，并补充运行时字段
                    this.tabs = savedTabs.tabs.map(tab => ({
                        ...tab,
                        data: this.getEmptyTabData(),
                        response: this.getEmptyResponseData(),
                        isLoading: false,
                        abortController: null,
                        ws: null,
                        sse: null
                    }));
                    this.tabCounter = savedTabs.tabCounter || this.tabs.length;
                    this.activeTabId = savedTabs.activeTabId || this.tabs[0].id;
                } else {
                    // 创建默认Tab
                    this.createTab('未命名请求', 'GET', null, true);
                }
                this.renderTabs();
                this.loadTabData(this.activeTabId);
                this.updateScrollButtons();

                // 监听Tab列表滚动事件，实时更新按钮状态
                const tabsList = byId('requestTabsList');
                if (tabsList) {
                    tabsList.addEventListener('scroll', () => this.updateScrollButtons());
                }

                // 监听窗口大小变化，更新按钮状态
                window.addEventListener('resize', () => this.updateScrollButtons());
            },

            /**
             * 保存Tab状态到localStorage
             * 只保存基本信息（id, name, method），不保存请求/响应数据
             */
            saveTabs() {
                StorageManager.set(this.STORAGE_KEY, {
                    tabs: this.tabs.map(tab => ({
                        id: tab.id,
                        name: tab.name,
                        method: tab.method
                    })),
                    tabCounter: this.tabCounter,
                    activeTabId: this.activeTabId
                });
            },

            /**
             * 获取空的Tab数据结构
             * @returns {Object} 空的请求数据
             */
            getEmptyTabData() {
                return {
                    method: 'GET',
                    url: '',
                    headers: [],
                    bodyType: 'none',
                    body: null,
                    hooks: {
                        preRequest: { enabled: true, script: '' },
                        postResponse: { enabled: true, script: '' }
                    }
                };
            },

            /**
             * 获取空的响应数据结构
             * @returns {Object} 空的响应数据
             */
            getEmptyResponseData() {
                return {
                    status: null,
                    statusText: '',
                    headers: {},
                    body: '',
                    duration: null,
                    contentType: null,
                    json: null
                };
            },

            /**
             * 创建新Tab
             * 每个Tab拥有独立的请求数据、响应数据、请求状态、AbortController和WS/SSE连接
             * @param {string} name - Tab名称
             * @param {string} method - HTTP方法
             * @param {Object|null} data - 请求数据（可选）
             * @param {boolean} isInit - 是否初始化时创建
             * @returns {string} 新Tab的ID
             */
            createTab(name = '未命名请求', method = 'GET', data = null, isInit = false) {
                // 如果不是初始化，先保存当前Tab数据
                if (!isInit && this.activeTabId) {
                    this.saveCurrentTabData();
                }

                const tabId = 'tab_' + (++this.tabCounter);
                const tab = {
                    id: tabId,
                    name: name,
                    method: method,
                    data: data || this.getEmptyTabData(),
                    // 每个Tab独立的响应数据
                    response: this.getEmptyResponseData(),
                    // 每个Tab独立的请求状态
                    isLoading: false,
                    abortController: null,
                    ws: null,
                    sse: null
                };

                this.tabs.push(tab);
                this.activeTabId = tabId;
                this.renderTabs();
                this.saveTabs();

                if (!isInit) {
                    this.loadTabData(tabId);
                    this.loadResponseData(tabId);
                }

                this.updateScrollButtons();
                return tabId;
            },

            /**
             * 切换Tab
             * 
             * 核心流程：
             * 1. 保存当前Tab的请求数据和响应数据
             * 2. 切换 activeTabId 到新Tab
             * 3. 加载新Tab的请求数据和响应数据到界面
             * 4. 更新发送按钮状态（可能新Tab正在请求中）
             * 
             * @param {string} tabId - 要切换到的Tab ID
             */
            switchTab(tabId) {
                if (tabId === this.activeTabId) return;

                // 【关键】保存当前Tab数据和响应
                // 确保切换后数据不丢失
                this.saveCurrentTabData();
                this.saveCurrentResponseData();

                // 切换到新Tab
                this.activeTabId = tabId;
                this.renderTabs();
                this.loadTabData(tabId);
                this.loadResponseData(tabId);

                // 【关键】更新发送按钮状态
                // 新Tab可能正在请求中，需要显示"取消"按钮
                this.updateSendButtonState();
                this.saveTabs();

                // 滚动到可见区域
                this.scrollToTab(tabId);
            },

            /**
             * 关闭Tab
             * @param {string} tabId - 要关闭的Tab ID
             * @param {Event} event - 点击事件（用于阻止冒泡）
             */
            closeTab(tabId, event) {
                if (event) {
                    event.stopPropagation();
                }

                const index = this.tabs.findIndex(t => t.id === tabId);
                if (index === -1) return;

                // 取消该Tab正在进行的请求
                const tabToClose = this.tabs[index];
                if (tabToClose.abortController) {
                    tabToClose.abortController.abort();
                }
                if (tabToClose.ws) {
                    try {
                        tabToClose.ws.close();
                    } catch (e) {
                        console.warn('关闭WS连接时出错:', e);
                    }
                }
                if (tabToClose.sse) {
                    try {
                        tabToClose.sse.close();
                    } catch (e) {
                        console.warn('关闭SSE连接时出错:', e);
                    }
                }

                // 至少保留一个Tab
                if (this.tabs.length === 1) {
                    // 清空当前Tab内容而不是关闭
                    this.loadTabData(tabId, true);
                    this.tabs[0].name = '未命名请求';
                    this.tabs[0].method = 'GET';
                    this.tabs[0].response = this.getEmptyResponseData();
                    this.tabs[0].isLoading = false;
                    this.tabs[0].abortController = null;
                    this.tabs[0].ws = null;
                    this.tabs[0].sse = null;
                    this.renderTabs();
                    this.saveTabs();
                    clearResponse();
                    return;
                }

                // 如果关闭的是当前激活的Tab，切换到相邻Tab
                let newActiveId = this.activeTabId;
                if (tabId === this.activeTabId) {
                    const newIndex = index < this.tabs.length - 1 ? index : index - 1;
                    newActiveId = this.tabs[newIndex].id;
                }

                this.tabs.splice(index, 1);
                this.activeTabId = newActiveId;
                this.renderTabs();
                this.loadTabData(newActiveId);
                this.loadResponseData(newActiveId);
                this.updateSendButtonState();
                this.saveTabs();
                this.updateScrollButtons();
            },

            /**
             * 保存当前Tab的数据
             */
            saveCurrentTabData() {
                const tab = this.tabs.find(t => t.id === this.activeTabId);
                if (!tab) return;

                tab.method = byId('httpMethod')?.value || 'GET';
                tab.name = this.getTabName(tab.method);
                tab.data = this.getCurrentRequestData();
            },

            /**
             * 保存当前Tab的响应数据
             * 注意：如果界面上没有数据但Tab已有数据，则保留原有数据（解决WS/SSE响应头丢失问题）
             */
            saveCurrentResponseData() {
                const tab = this.tabs.find(t => t.id === this.activeTabId);
                if (!tab) return;

                const responseInfo = byId('responseInfo');
                const responseBody = byId('responseBody');
                const currentHeaders = this.getCurrentResponseHeaders();

                // 检查是否为流式连接（WebSocket/SSE）
                const isStreaming = tab.response?.contentType === 'websocket' || tab.response?.contentType === 'text/event-stream';

                // 如果是流式连接且Tab已有状态数据，保留原有状态
                if (isStreaming && tab.response?.status) {
                    // 只更新响应体和响应头，保留原有状态
                    tab.response = {
                        ...tab.response,
                        headers: Object.keys(currentHeaders).length > 0 ? currentHeaders : (tab.response?.headers || {}),
                        body: responseBody?.value || tab.response?.body || ''
                    };
                    return;
                }

                // 获取界面上的响应数据
                const newResponse = {
                    status: responseInfo?.dataset?.status || null,
                    statusText: responseInfo?.dataset?.statusText || '',
                    headers: Object.keys(currentHeaders).length > 0 ? currentHeaders : (tab.response?.headers || {}),
                    body: responseBody?.value || '',
                    duration: responseInfo?.dataset?.duration || null,
                    contentType: responseInfo?.dataset?.contentType || null
                };

                tab.response = newResponse;
            },

            /**
             * 获取当前响应头数据
             * @returns {Object} 响应头数据
             */
            getCurrentResponseHeaders() {
                const headers = {};
                const responseHeaders = byId('responseHeaders');
                if (responseHeaders) {
                    const tbody = responseHeaders.getElementsByTagName('tbody')[0];
                    if (tbody) {
                        tbody.querySelectorAll('tr').forEach(row => {
                            const cells = row.getElementsByTagName('td');
                            if (cells.length >= 2) {
                                headers[cells[0].textContent] = cells[1].textContent;
                            }
                        });
                    }
                }
                return headers;
            },

            /**
             * 加载响应数据到界面
             * @param {string} tabId - Tab ID
             */
            loadResponseData(tabId) {
                const tab = this.tabs.find(t => t.id === tabId);
                if (!tab) return;

                const response = tab.response || this.getEmptyResponseData();
                const responseInfo = byId('responseInfo');
                const responseBody = byId('responseBody');

                if (response.status !== null) {
                    // 有响应数据
                    if (responseInfo) {
                        // 根据内容类型判断是否为WS/SSE连接
                        const isStreaming = response.contentType === 'websocket' || response.contentType === 'text/event-stream';
                        const durationText = response.duration ? `${response.duration}ms` : (isStreaming ? '持续连接中' : '未知');

                        responseInfo.innerHTML = `
                            状态码: ${response.status} ${response.statusText}<br>
                            响应时间: ${durationText}<br>
                            内容类型: ${response.contentType || '未指定'}<br>
                        `;
                        responseInfo.className = 'response-info httpStatus' + String(response.status).charAt(0);
                        responseInfo.dataset.status = response.status;
                        responseInfo.dataset.statusText = response.statusText;
                        responseInfo.dataset.duration = response.duration || '';
                        responseInfo.dataset.contentType = response.contentType || '';
                    }

                    if (responseBody) {
                        responseBody.value = response.body || '';
                    }

                    // 恢复响应头
                    this.loadResponseHeaders(response.headers);

                    // 检查是否为JSON，显示格式化按钮
                    if (response.body && (response.body.trim().startsWith('{') || response.body.trim().startsWith('['))) {
                        try {
                            JSON.parse(response.body);
                            showJsonFormatButton();
                        } catch {
                            resetJsonFormatState();
                        }
                    } else {
                        resetJsonFormatState();
                    }
                } else {
                    // 无响应数据，清空
                    clearResponse();
                }
            },

            /**
             * 加载响应头到界面
             * 支持普通格式和WS/SSE格式（值可能是数组）
             * @param {Object} headers - 响应头对象
             */
            loadResponseHeaders(headers) {
                const responseHeaders = byId('responseHeaders');
                if (!responseHeaders) return;

                const tbody = responseHeaders.getElementsByTagName('tbody')[0];
                if (!tbody) return;

                tbody.innerHTML = '';
                if (headers && Object.keys(headers).length > 0) {
                    Object.entries(headers).forEach(([name, value]) => {
                        const row = document.createElement('tr');
                        // 处理数组格式的值（WS/SSE响应头）
                        const displayValue = Array.isArray(value) ? value.join(', ') : value;
                        row.innerHTML = `
                            <td>${name}</td>
                            <td>${displayValue}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            },

            /**
             * 更新发送按钮状态（根据当前Tab的isLoading）
             */
            updateSendButtonState() {
                const tab = this.tabs.find(t => t.id === this.activeTabId);
                const sendBtn = byId('sendBtn');
                const sendBtnGroup = byId('sendBtnGroup');

                if (!tab || !sendBtn) return;

                if (tab.isLoading) {
                    sendBtn.disabled = false;
                    sendBtn.classList.add('loading');
                    sendBtn.textContent = '取消';
                    sendBtnGroup?.classList.add('loading-group');
                } else {
                    sendBtn.disabled = false;
                    sendBtn.classList.remove('loading');
                    sendBtn.textContent = '发送';
                    sendBtnGroup?.classList.remove('loading-group');
                }
            },

            /**
             * 设置当前Tab的加载状态
             * @param {boolean} loading - 是否加载中
             */
            setLoading(loading) {
                const tab = this.tabs.find(t => t.id === this.activeTabId);
                if (tab) {
                    tab.isLoading = loading;
                }
                this.updateSendButtonState();
            },

            /**
             * 获取当前Tab的AbortController
             * @returns {AbortController|null}
             */
            getAbortController() {
                const tab = this.tabs.find(t => t.id === this.activeTabId);
                return tab?.abortController || null;
            },

            /**
             * 设置当前Tab的AbortController
             * @param {AbortController|null} controller
             */
            setAbortController(controller) {
                const tab = this.tabs.find(t => t.id === this.activeTabId);
                if (tab) {
                    tab.abortController = controller;
                }
            },

            /**
             * 设置指定Tab的AbortController
             * @param {string} tabId - Tab ID
             * @param {AbortController|null} controller
             */
            setAbortControllerForTab(tabId, controller) {
                const tab = this.tabs.find(t => t.id === tabId);
                if (tab) {
                    tab.abortController = controller;
                }
            },

            /**
             * 清除指定Tab的加载状态
             * @param {string} tabId - Tab ID
             */
            clearTabLoadingState(tabId) {
                const tab = this.tabs.find(t => t.id === tabId);
                if (tab) {
                    tab.isLoading = false;
                    tab.abortController = null;
                }
                // 只有当前Tab才更新按钮状态
                if (tabId === this.activeTabId) {
                    this.updateSendButtonState();
                }
            },

            /**
             * 保存响应数据到指定Tab
             * @param {string} tabId - Tab ID
             * @param {Object} responseData - 响应数据
             */
            saveResponseToTab(tabId, responseData) {
                const tab = this.tabs.find(t => t.id === tabId);
                if (tab) {
                    tab.response = {
                        status: responseData.status,
                        statusText: responseData.statusText,
                        headers: responseData.headers,
                        body: responseData.body,
                        duration: responseData.duration,
                        contentType: responseData.contentType
                    };
                }
            },

            /**
             * 根据URL或方法生成Tab名称
             * @param {string} method - HTTP方法
             * @returns {string} Tab名称
             */
            getTabName(method) {
                const url = byId('url')?.value || '';
                if (url) {
                    try {
                        const urlObj = new URL(url);
                        return urlObj.pathname || urlObj.hostname || '未命名请求';
                    } catch {
                        return url.substring(0, 20) || '未命名请求';
                    }
                }
                return '未命名请求';
            },

            /**
             * 获取当前请求的所有数据
             * @returns {Object} 请求数据
             */
            getCurrentRequestData() {
                const method = byId('httpMethod')?.value || 'GET';
                const url = byId('url')?.value || '';
                const bodyType = getBodyType();

                // 获取请求头
                const headers = [];
                docSelectAll('#headersList .header-row').forEach(row => {
                    const inputs = row.getElementsByTagName('input');
                    if (inputs[1]?.value) {
                        headers.push({
                            enabled: inputs[0]?.checked ?? true,
                            name: inputs[1]?.value || '',
                            value: inputs[2]?.value || '',
                            remark: inputs[3]?.value || ''
                        });
                    }
                });

                // 获取请求体
                let body = null;
                if (bodyType === 'json') {
                    const rows = [];
                    docSelectAll('#jsonBodyRows .body-row').forEach(row => {
                        rows.push({
                            selected: row.querySelector('input[type="radio"]')?.checked || false,
                            content: row.querySelector('textarea')?.value || '',
                            remark: row.querySelector('.body-remark')?.value || ''
                        });
                    });
                    body = { type: 'json', data: rows };
                } else if (bodyType === 'text') {
                    const rows = [];
                    docSelectAll('#textBodyRows .body-row').forEach(row => {
                        rows.push({
                            selected: row.querySelector('input[type="radio"]')?.checked || false,
                            content: row.querySelector('textarea')?.value || '',
                            remark: row.querySelector('.body-remark')?.value || ''
                        });
                    });
                    body = { type: 'text', data: rows };
                } else if (bodyType === 'form') {
                    const formData = [];
                    docSelectAll('#formRows .header-row').forEach(row => {
                        const inputs = row.getElementsByTagName('input');
                        if (inputs[1]?.value) {
                            formData.push({
                                enabled: inputs[0]?.checked ?? true,
                                name: inputs[1]?.value || '',
                                value: inputs[2]?.value || '',
                                remark: inputs[3]?.value || ''
                            });
                        }
                    });
                    body = { type: 'form', data: formData };
                } else if (bodyType === 'formdata') {
                    const formDataItems = [];
                    docSelectAll('.formdata-row').forEach(row => {
                        const key = row.querySelector('.formdata-key')?.value;
                        if (key) {
                            formDataItems.push({
                                enabled: row.querySelector('input[type="checkbox"]')?.checked ?? true,
                                key: key,
                                type: row.querySelector('.formdata-type')?.value || 'text',
                                value: row.querySelector('.text-input')?.value || '',
                                remark: row.querySelector('.formdata-remark')?.value || ''
                            });
                        }
                    });
                    body = { type: 'formdata', data: formDataItems };
                }

                return {
                    method,
                    url,
                    headers,
                    bodyType,
                    body,
                    hooks: HookEngine.getHookScripts()
                };
            },

            /**
             * 加载Tab数据到界面
             * @param {string} tabId - Tab ID
             * @param {boolean} clearMode - 是否清空模式
             */
            loadTabData(tabId, clearMode = false) {
                const tab = this.tabs.find(t => t.id === tabId);
                if (!tab) return;

                const data = clearMode ? this.getEmptyTabData() : (tab.data || this.getEmptyTabData());

                // 设置方法和URL
                byId('httpMethod').value = data.method || 'GET';
                byId('url').value = data.url || '';

                // 设置请求头
                const headersList = byId('headersList');
                headersList.innerHTML = '';
                if (data.headers && data.headers.length > 0) {
                    data.headers.forEach(h => {
                        const row = document.createElement('div');
                        row.className = 'header-row';
                        row.innerHTML = `
                            <input type="checkbox" ${h.enabled ? 'checked' : ''}>
                            <input type="text" placeholder="Header名称" value="${h.name || ''}" />
                            <input type="text" placeholder="Header值" value="${h.value || ''}" />
                            <input type="text" placeholder="备注" class="header-remark input-remark" value="${h.remark || ''}" />
                            <button class="remove-btn" onclick="removeHeader(this)">删除</button>
                        `;
                        headersList.appendChild(row);
                    });
                } else {
                    // 添加一个空行
                    const row = document.createElement('div');
                    row.className = 'header-row';
                    row.innerHTML = `
                        <input type="checkbox" checked>
                        <input type="text" placeholder="Header名称" />
                        <input type="text" placeholder="Header值" />
                        <input type="text" placeholder="备注" class="header-remark input-remark" />
                        <button class="remove-btn" onclick="removeHeader(this)">删除</button>
                    `;
                    headersList.appendChild(row);
                }

                // 设置请求体类型
                const bodyType = data.bodyType || 'none';
                const bodyTypeRadio = document.querySelector(`input[name="bodyType"][value="${bodyType}"]`);
                if (bodyTypeRadio) {
                    bodyTypeRadio.checked = true;
                    updateBodyType(bodyType);
                }

                // 加载请求体数据
                this.loadBodyData(data.body, bodyType);

                // 加载Hook脚本
                if (data.hooks) {
                    HookEngine.setHookScripts(data.hooks);
                } else {
                    HookEngine.setHookScripts({
                        preRequest: { enabled: true, script: '' },
                        postResponse: { enabled: true, script: '' }
                    });
                }

                // 清空响应区域
                clearResponse();
            },

            /**
             * 加载请求体数据
             * @param {Object|null} body - 请求体数据
             * @param {string} bodyType - 请求体类型
             */
            loadBodyData(body, bodyType) {
                if (!body) return;

                if (bodyType === 'json' && body.data) {
                    const jsonBodyRows = byId('jsonBodyRows');
                    jsonBodyRows.innerHTML = '';
                    body.data.forEach(item => {
                        const row = createJsonBodyRow();
                        row.querySelector('input[type="radio"]').checked = item.selected || false;
                        row.querySelector('textarea').value = item.content || '';
                        row.querySelector('.body-remark').value = item.remark || '';
                        jsonBodyRows.appendChild(row);
                    });
                } else if (bodyType === 'text' && body.data) {
                    const textBodyRows = byId('textBodyRows');
                    textBodyRows.innerHTML = '';
                    body.data.forEach(item => {
                        const row = createTextBodyRow();
                        row.querySelector('input[type="radio"]').checked = item.selected || false;
                        row.querySelector('textarea').value = item.content || '';
                        row.querySelector('.body-remark').value = item.remark || '';
                        textBodyRows.appendChild(row);
                    });
                } else if (bodyType === 'form' && body.data) {
                    const formRows = byId('formRows');
                    formRows.innerHTML = '';
                    body.data.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'header-row';
                        row.innerHTML = `
                            <input type="checkbox" ${item.enabled ? 'checked' : ''}>
                            <input type="text" placeholder="参数名" value="${item.name || ''}" />
                            <input type="text" placeholder="参数值" value="${item.value || ''}" />
                            <input type="text" placeholder="备注" class="input-remark" value="${item.remark || ''}" />
                            <button class="remove-btn" onclick="removeHeader(this)">删除</button>
                        `;
                        formRows.appendChild(row);
                    });
                } else if (bodyType === 'formdata' && body.data) {
                    const formDataList = byId('formDataList');
                    formDataList.innerHTML = '';
                    body.data.forEach(item => {
                        addFormDataRow(item);
                    });
                }
            },

            /**
             * 渲染Tab列表
             */
            renderTabs() {
                const tabsList = byId('requestTabsList');
                tabsList.innerHTML = this.tabs.map(tab => {
                    const method = tab.method || 'GET';
                    const methodClass = method.toLowerCase();
                    const isActive = tab.id === this.activeTabId;
                    return `
                        <div class="request-tab-item ${isActive ? 'active' : ''}" 
                             onclick="RequestTabManager.switchTab('${tab.id}')"
                             data-tab-id="${tab.id}">
                            <span class="tab-method ${methodClass}">${method}</span>
                            <span class="tab-name" title="${tab.name}">${tab.name}</span>
                            <span class="tab-close-btn" onclick="RequestTabManager.closeTab('${tab.id}', event)">×</span>
                        </div>
                    `;
                }).join('');
            },

            /**
             * 更新滚动按钮显示状态
             */
            updateScrollButtons() {
                const tabsList = byId('requestTabsList');
                const leftBtn = byId('tabScrollLeft');
                const rightBtn = byId('tabScrollRight');

                const hasOverflow = tabsList.scrollWidth > tabsList.clientWidth;

                if (hasOverflow) {
                    leftBtn.classList.add('show');
                    rightBtn.classList.add('show');

                    // 检测是否滚动到最左边
                    if (tabsList.scrollLeft <= 5) {
                        leftBtn.classList.add('disabled');
                    } else {
                        leftBtn.classList.remove('disabled');
                    }

                    // 检测是否滚动到最右边
                    if (tabsList.scrollLeft >= tabsList.scrollWidth - tabsList.clientWidth - 5) {
                        rightBtn.classList.add('disabled');
                    } else {
                        rightBtn.classList.remove('disabled');
                    }
                } else {
                    leftBtn.classList.remove('show');
                    rightBtn.classList.remove('show');
                }
            },

            /**
             * 滚动Tab列表
             * @param {string} direction - 滚动方向：'left' 或 'right'
             */
            scrollTabs(direction) {
                const tabsList = byId('requestTabsList');
                const scrollAmount = 200;
                if (direction === 'left') {
                    tabsList.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                } else {
                    tabsList.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
                // 延迟更新按钮状态（等待滚动完成）
                setTimeout(() => this.updateScrollButtons(), 300);
            },

            /**
             * 滚动到指定Tab使其可见
             * @param {string} tabId - Tab ID
             */
            scrollToTab(tabId) {
                const tabElement = document.querySelector(`[data-tab-id="${tabId}"]`);
                const tabsList = byId('requestTabsList');
                if (tabElement && tabsList) {
                    const tabRect = tabElement.getBoundingClientRect();
                    const listRect = tabsList.getBoundingClientRect();
                    const tabLeft = tabElement.offsetLeft;
                    const tabWidth = tabElement.offsetWidth;
                    const listWidth = tabsList.clientWidth;

                    // 计算需要滚动的位置，使Tab居中
                    const scrollLeft = tabLeft - (listWidth / 2) + (tabWidth / 2);
                    tabsList.scrollTo({ left: Math.max(0, scrollLeft), behavior: 'smooth' });
                }
            },

            /**
             * 更新当前Tab的方法显示
             * @param {string} method - HTTP方法
             */
            updateTabMethod(method) {
                const tab = this.tabs.find(t => t.id === this.activeTabId);
                if (tab) {
                    tab.method = method;
                    this.renderTabs();
                    this.saveTabs();
                }
            },

            /**
             * 从历史记录或接口集合加载数据到当前Tab
             * @param {Object} data - 请求数据
             */
            loadFromExternal(data) {
                this.saveCurrentTabData();

                const tab = this.tabs.find(t => t.id === this.activeTabId);
                if (tab) {
                    tab.name = this.extractNameFromData(data);
                    tab.method = data.method || 'GET';
                    tab.data = this.convertExternalData(data);
                    this.renderTabs();
                    this.loadTabData(this.activeTabId);
                    this.saveTabs();
                }
            },

            /**
             * 从外部数据提取名称
             * @param {Object} data - 外部数据
             * @returns {string} 名称
             */
            extractNameFromData(data) {
                if (data.url) {
                    try {
                        const urlObj = new URL(data.url);
                        return urlObj.pathname || urlObj.hostname || '未命名请求';
                    } catch {
                        return data.url.substring(0, 20) || '未命名请求';
                    }
                }
                return '未命名请求';
            },

            /**
             * 转换外部数据格式
             * @param {Object} data - 外部数据
             * @returns {Object} 内部数据格式
             */
            convertExternalData(data) {
                // 转换请求头
                const headers = [];
                if (data.headers) {
                    if (Array.isArray(data.headers)) {
                        // 数组格式 [{name, value, enabled, remark}]
                        data.headers.forEach(h => {
                            if (h.name) {
                                headers.push({
                                    enabled: h.enabled !== false,
                                    name: h.name,
                                    value: h.value || '',
                                    remark: h.remark || ''
                                });
                            }
                        });
                    } else if (typeof data.headers === 'object') {
                        // 对象格式 {name: {value, enabled, remark}}
                        Object.entries(data.headers).forEach(([name, info]) => {
                            headers.push({
                                enabled: info.enabled !== false,
                                name: name,
                                value: info.value || '',
                                remark: info.remark || ''
                            });
                        });
                    }
                }

                return {
                    method: data.method || 'GET',
                    url: data.url || '',
                    headers,
                    bodyType: data.body?.type || 'none',
                    body: data.body,
                    hooks: data.hooks || null
                };
            }
        };

        /**
         * 滚动Tab列表（全局函数，供onclick调用）
         * @param {string} direction - 滚动方向
         */
        function scrollTabs(direction) {
            RequestTabManager.scrollTabs(direction);
        }

        // localStorage管理工具
        const StorageManager = {
            /**
             * 安全地从localStorage获取数据
             * @param {string} key - 存储键
             * @param {any} defaultValue - 默认值
             * @returns {any} 解析后的数据
             */
            get(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (error) {
                    console.error(`读取localStorage失败 [${key}]:`, error);
                    return defaultValue;
                }
            },

            /**
             * 安全地向localStorage存储数据
             * @param {string} key - 存储键
             * @param {any} value - 要存储的数据
             */
            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (error) {
                    console.error(`写入localStorage失败 [${key}]:`, error);
                }
            },

            /**
             * 从localStorage删除数据
             * @param {string} key - 存储键
             */
            remove(key) {
                try {
                    localStorage.removeItem(key);
                } catch (error) {
                    console.error(`删除localStorage失败 [${key}]:`, error);
                }
            }
        };

        /**
         * 切换发送按钮下拉菜单
         * @param {Event} event - 点击事件
         */
        function toggleSendDropdown(event) {
            event.stopPropagation();
            const menu = byId('sendDropdownMenu');
            if (menu) {
                menu.classList.toggle('show');
            }
        }

        /**
         * 关闭发送按钮下拉菜单
         */
        function closeSendDropdown() {
            const menu = byId('sendDropdownMenu');
            if (menu) {
                menu.classList.remove('show');
            }
        }

        document.addEventListener('click', function (event) {
            const sendBtnGroup = byId('sendBtnGroup');
            if (sendBtnGroup && !sendBtnGroup.contains(event.target)) {
                closeSendDropdown();
            }
        });

        /**
         * 处理发送按钮点击事件
         * 根据按钮当前状态决定是发送请求还是取消请求
         */
        function handleSendButtonClick() {
            const sendBtn = byId('sendBtn');
            if (!sendBtn) return;

            if (sendBtn.classList.contains('loading')) {
                cancelRequest();
            } else {
                sendRequest();
            }
        }

        /**
         * 取消当前请求
         * 调用 AbortController 中断正在进行的请求
         */
        function cancelRequest() {
            const abortController = RequestTabManager.getAbortController();
            if (abortController) {
                abortController.abort();
                RequestTabManager.setAbortController(null);
            }

            const tab = RequestTabManager.tabs.find(t => t.id === RequestTabManager.activeTabId);
            if (tab) {
                if (tab.ws) {
                    try {
                        tab.ws.close();
                    } catch (e) {
                        console.warn('关闭WS连接时出错:', e);
                    }
                    tab.ws = null;
                }
                if (tab.sse) {
                    try {
                        tab.sse.close();
                    } catch (e) {
                        console.warn('关闭SSE连接时出错:', e);
                    }
                    tab.sse = null;
                }
            }

            RequestTabManager.setLoading(false);
        }

        /**
         * 发送HTTP请求或建立WS/SSE连接
         * 
         * 核心流程：
         * 1. 保存当前Tab ID（用于响应时判断是否还在同一个Tab）
         * 2. 创建AbortController并绑定到发起请求的Tab
         * 3. 执行前置Hook脚本
         * 4. 根据代理模式选择不同的请求方式
         * 5. 处理响应并执行后置Hook脚本
         * 6. 根据Tab状态决定更新界面还是保存数据
         * 
         * @param {boolean} download - 是否为下载请求
         * @returns {Promise<void>}
         */
        async function sendRequest(download = false) {
            // 【关键】保存当前Tab ID，用于判断请求完成后是否还在同一个Tab
            // 这是解决多Tab请求串扰问题的核心
            const currentTabId = RequestTabManager.activeTabId;

            clearResponse();
            RequestTabManager.setLoading(true);

            const abortController = new AbortController();
            // 设置到发起请求的Tab，而不是当前Tab
            RequestTabManager.setAbortControllerForTab(currentTabId, abortController);
            const signal = abortController.signal;

            try {
                const methodElement = byId('httpMethod');
                const urlElement = byId('url');

                if (!methodElement || !urlElement) {
                    throw new Error('无法获取请求方法或URL');
                }

                let method = methodElement.value;
                let url = urlElement.value;
                const bodyType = getBodyType();

                url = replaceVariables(url)?.trim() || '';
                const settings = getRequestSettings();
                url = normalizeUrlWithProtocol(url, settings.default_protocol);
                if (!url) {
                    throw new Error('请输入有效的URL');
                }

                let headers = await buildRequestHeaders();

                let requestBody = null;
                if (bodyType !== 'none' && method !== 'GET') {
                    requestBody = await getRequestBody(bodyType);
                }

                const hookRequest = await HookEngine.executePreRequest({
                    url,
                    method,
                    headers,
                    body: requestBody,
                    bodyType,
                    settings
                });

                url = hookRequest.url;
                method = hookRequest.method;
                headers = hookRequest.headers;
                requestBody = hookRequest.body;

                const requestOptions = {
                    method,
                    headers,
                    cache: settings.cache,
                    mode: settings.mode,
                    credentials: settings.credentials,
                    redirect: settings.redirect,
                    referrer: settings.referrer,
                    referrerPolicy: settings.referrerPolicy,
                    integrity: settings.integrity || undefined,
                    keepalive: settings.keepalive,
                    signal: signal
                };

                if (useProxy && method !== 'WS' && method !== 'SSE') {
                    await handleProxyRequest(url, method, bodyType, headers, settings, download, signal, requestBody, currentTabId);
                    return;
                }

                if (useProxy && (method === 'WS' || method === 'SSE')) {
                    await handleWSRequest(url, method, headers, settings, signal, currentTabId);
                    return;
                }

                if (bodyType !== 'none' && method !== 'GET') {
                    await setContentTypeAndBody(headers, bodyType, requestOptions, requestBody);
                }

                const startTime = Date.now();
                const response = await fetch(url, requestOptions);
                const duration = Date.now() - startTime;
                const contentType = response.headers.get('content-type');

                const responseHeaders = {};
                response.headers.forEach((value, key) => {
                    responseHeaders[key] = value;
                });

                let responseText = '';
                const binaryTypes = [
                    'application/octet-stream',
                    'application/pdf',
                    'image/',
                    'audio/',
                    'video/',
                    'application/zip',
                    'application/x-rar'
                ];
                const isBinaryContent = contentType && binaryTypes.some(type => contentType.includes(type));

                if (!isBinaryContent) {
                    responseText = await response.text();
                }

                const hookResponse = await HookEngine.executePostResponse({
                    status: response.status,
                    statusText: response.statusText,
                    headers: responseHeaders,
                    body: responseText,
                    duration,
                    contentType
                });

                if (hookResponse.body !== undefined && hookResponse.body !== responseText) {
                    responseText = hookResponse.body;
                }

                // 检查是否还在同一个Tab，如果是才更新界面
                if (RequestTabManager.activeTabId === currentTabId) {
                    if (download) {
                        await handleDownloadResponse(response, contentType);
                    } else {
                        await handleNormalResponseWithBody(response, duration, contentType, responseText, isBinaryContent);
                    }
                    await updateResponseHeaders(response);
                    RequestTabManager.saveCurrentResponseData();
                } else {
                    // 不在同一个Tab，将响应数据保存到发起请求的Tab中
                    RequestTabManager.saveResponseToTab(currentTabId, {
                        status: response.status,
                        statusText: response.statusText,
                        headers: responseHeaders,
                        body: responseText,
                        duration,
                        contentType
                    });
                }

                saveRequestToHistory();
            } catch (error) {
                // 只有在同一个Tab时才显示错误
                if (RequestTabManager.activeTabId === currentTabId) {
                    await handleRequestError(error);
                }
            } finally {
                // 清除发起请求的Tab的状态，而不是当前Tab
                RequestTabManager.clearTabLoadingState(currentTabId);
            }
        }

        /**
         * 处理普通响应（带响应体）
         * 用于Hook执行后显示响应内容
         * @param {Response} response - fetch响应对象
         * @param {number} duration - 响应耗时（毫秒）
         * @param {string} contentType - 响应内容类型
         * @param {string} responseText - 响应体文本
         * @param {boolean} isBinaryContent - 是否为二进制内容
         * @returns {Promise<void>}
         */
        async function handleNormalResponseWithBody(response, duration, contentType, responseText, isBinaryContent) {
            const responseInfo = byId('responseInfo');
            const responseBody = byId('responseBody');

            if (responseInfo) {
                responseInfo.innerHTML = `
                    状态码: ${response.status} ${response.statusText}<br>
                    响应时间: ${duration}ms<br>
                    内容类型: ${contentType || '未指定'}<br>
                `;
                responseInfo.classList = 'response-info httpStatus' + (response.status + "").substr(0, 1);
                // 保存响应数据到dataset，用于Tab切换时保存
                responseInfo.dataset.status = response.status;
                responseInfo.dataset.statusText = response.statusText;
                responseInfo.dataset.duration = duration;
                responseInfo.dataset.contentType = contentType || '';
            }

            resetJsonFormatState();

            if (isBinaryContent) {
                if (responseBody) {
                    responseBody.value = `[二进制内容] - ${contentType}\n建议使用"发送并下载"按钮下载此内容`;
                }
            } else {
                if (responseBody) {
                    responseBody.value = responseText;
                }

                const isJsonContentType = contentType?.includes('application/json');
                const isJsonFormat = responseText.trim() && (
                    responseText.trim().startsWith('{') ||
                    responseText.trim().startsWith('[')
                );

                if (isJsonContentType || (isJsonFormat && (() => {
                    try {
                        JSON.parse(responseText.trim());
                        return true;
                    } catch {
                        return false;
                    }
                })())) {
                    showJsonFormatButton();
                }
            }
        }

        /**
         * 保存当前请求到历史记录
         * 将当前请求的所有信息（方法、URL、请求头、请求体）保存到localStorage
         */
        function saveRequestToHistory() {
            const method = byId('httpMethod').value;
            const url = byId('url').value;
            const bodyType = getBodyType();

            // 获取请求头
            const headers = {};
            docSelectAll('#headersList .header-row').forEach(row => {
                const inputs = row.getElementsByTagName('input');
                const isEnabled = inputs[0].checked;
                // 只要有key就保存
                if (inputs[1].value) {
                    headers[inputs[1].value] = {
                        // 如果value为空，使用空字符串
                        value: inputs[2].value || '',
                        // 保存复选框状态
                        enabled: isEnabled,
                        // 保存备注
                        remark: inputs[3].value || ''
                    };
                }
            });

            // 获取请求体
            let body = null;
            if (bodyType === 'form') {
                const formData = {};
                docSelectAll('#formRows .header-row').forEach((row) => {
                    const inputs = row.getElementsByTagName('input');
                    const isEnabled = inputs[0].checked;
                    // 只要有key就保存
                    if (inputs[1].value) {
                        formData[inputs[1].value] = {
                            // 如果value为空，使用空字符串
                            value: inputs[2].value || '',
                            // 保存复选框状态
                            enabled: isEnabled,
                            // 保存备注
                            remark: inputs[3].value || ''
                        };
                    }
                });
                body = { type: 'form', data: formData };
            } else if (bodyType === 'formdata') {
                const formDataItems = [];
                docSelectAll('.formdata-row').forEach(row => {
                    const key = row.querySelector('.formdata-key').value;
                    const type = row.querySelector('.formdata-type').value;
                    const isEnabled = row.querySelector('input[type="checkbox"]').checked;
                    // 只要有key就保存
                    if (key) {
                        const value = type === 'text' ? (row.querySelector('.text-input').value || '') : null;
                        const remarkInput = row.querySelector('.formdata-remark');
                        formDataItems.push({
                            key,
                            type,
                            value,
                            enabled: isEnabled,
                            remark: remarkInput ? remarkInput.value : ''
                        });
                    }
                });
                body = { type: 'formdata', data: formDataItems };
            } else if (bodyType === 'json') {
                const jsonBodyItems = [];
                docSelectAll('#jsonBodyRows .body-row').forEach(row => {
                    const isSelected = row.querySelector('input[type="radio"]').checked;
                    const content = row.querySelector('textarea').value;
                    const remark = row.querySelector('.body-remark').value;
                    jsonBodyItems.push({
                        content,
                        selected: isSelected,
                        remark
                    });
                });
                body = { type: 'json', data: jsonBodyItems };
            } else if (bodyType === 'text') {
                const textBodyItems = [];
                docSelectAll('#textBodyRows .body-row').forEach(row => {
                    const isSelected = row.querySelector('input[type="radio"]').checked;
                    const content = row.querySelector('textarea').value;
                    const remark = row.querySelector('.body-remark').value;
                    textBodyItems.push({
                        content,
                        selected: isSelected,
                        remark
                    });
                });
                body = { type: 'text', data: textBodyItems };
            } else if (bodyType === 'binary') {
                const binaryBodyItems = [];
                docSelectAll('#binaryBodyRows .body-row').forEach(row => {
                    const isSelected = row.querySelector('input[type="radio"]').checked;
                    const fileInput = row.querySelector('input[type="file"]');
                    const remark = row.querySelector('.body-remark').value;
                    // 对于文件，我们只能保存文件名，不能保存文件内容
                    const fileName = fileInput.files.length > 0 ? fileInput.files[0].name : '';
                    binaryBodyItems.push({
                        fileName,
                        selected: isSelected,
                        remark
                    });
                });
                body = { type: 'binary', data: binaryBodyItems };
            } else if (bodyType === 'websocket') {
                const wsBodyItems = [];
                docSelectAll('#wsBodyRows .body-row').forEach(row => {
                    const isSelected = row.querySelector('input[type="radio"]').checked;
                    const type = row.querySelector('.ws-body-type').value;
                    let value = '';
                    if (type === 'file') {
                        const fileInput = row.querySelector('.ws-body-file');
                        value = fileInput.files.length > 0 ? fileInput.files[0].name : '';
                    } else {
                        value = row.querySelector('.ws-body-text').value;
                    }
                    const remark = row.querySelector('.body-remark').value;
                    wsBodyItems.push({ type, value, selected: isSelected, remark });
                });
                body = { type: 'websocket', data: wsBodyItems };
            } else if (bodyType !== 'none') {
                // 对于其他类型的请求体，尝试从多行结构中获取
                body = { type: bodyType, data: byId('requestBody').value };
            }

            const historyItem = {
                method,
                url,
                headers,
                body,
                hooks: HookEngine.getHookScripts(),
                timestamp: new Date().toISOString()
            };

            // 获取现有历史记录
            let history = StorageManager.get('requestHistory', []);

            // 添加新记录到开头
            history.unshift(historyItem);

            // 限制历史记录数量
            if (history.length > MAX_HISTORY_ITEMS) {
                history = history.slice(0, MAX_HISTORY_ITEMS);
            }

            // 保存回localStorage
            StorageManager.set('requestHistory', history);

            // 更新显示
            updateHistoryDisplay();
        }

        /**
         * 从历史记录加载请求
         * 将历史记录中的请求信息恢复到当前界面
         * @param {Object} historyItem - 历史记录项
         */
        function loadRequestFromHistory(historyItem) {
            // 添加数据有效性检查
            if (!historyItem || typeof historyItem !== 'object') {
                console.error('无效的历史记录数据');
                return;
            }

            try {
                // 使用RequestTabManager加载外部数据
                RequestTabManager.loadFromExternal(historyItem);
            } catch (error) {
                console.error('加载请求数据时出错:', error);
                alert('加载请求数据时出错，请检查数据格式是否正确');
            }
        }

        /**
         * 更新历史记录显示
         * 从localStorage读取历史记录并在页面上显示
         */
        function updateHistoryDisplay() {
            const historyList = byId('historyList');
            const history = StorageManager.get('requestHistory', []);

            historyList.innerHTML = history.map((item, index) => {
                const date = new Date(item.timestamp);
                const formattedDate = date.toLocaleString('zh-CN');
                // 将历史记录项存储在一个自定义属性中
                const safeItem = JSON.stringify(item).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
                return `
                    <div class="history-item">
                        <div class="history-time">${formattedDate}</div>
                        <div>
                            <span class="history-method">${item.method}</span>
                            <span class="history-url">${item.url}</span>
                        </div>
                        <button class="history-load-btn" data-history='${safeItem}'>加载请求</button>
                    </div>
                `;
            }).join('');

            // 为所有加载按钮添加事件监听器
            docSelectAll('.history-load-btn').forEach(button => {
                button.addEventListener('click', function () {
                    try {
                        if (!this.dataset.history && !this.dataset.api) {
                            console.error('没有找到历史记录数据');
                            return;
                        }
                        const historyItem = JSON.parse(this.dataset.history || this.dataset.api);
                        if (!historyItem || typeof historyItem !== 'object') {
                            console.error('无效的历史记录数据');
                            return;
                        }
                        loadRequestFromHistory(historyItem);
                    } catch (error) {
                        console.error('解析历史记录数据时出错:', error);
                        alert('加载历史记录失败，数据格式可能已损坏');
                    }
                });
            });
        }

        /**
         * 清空所有历史记录
         * 删除localStorage中的所有历史记录
         */
        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？此操作不可撤销。')) {
                StorageManager.remove('requestHistory');
                updateHistoryDisplay();
            }
        }

        /**
         * 导出历史记录
         * 将历史记录导出为JSON文件
         */
        function exportHistory() {
            const history = StorageManager.get('requestHistory', []);
            if (history.length === 0) {
                return alert('历史记录为空，无需导出');
            }

            const dataStr = JSON.stringify(history, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'history_export.json';
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        /**
         * 导入历史记录
         * 从JSON文件导入历史记录
         */
        function importHistory() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.json';
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);

            fileInput.addEventListener('change', async (event) => {
                const file = event.target.files[0];
                if (!file) {
                    return;
                }

                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const content = e.target.result;
                        const history = JSON.parse(content);

                        // 数据有效性检查
                        if (!Array.isArray(history)) {
                            throw new Error('导入的历史记录数据格式不正确');
                        }

                        // 限制导入的历史记录数量
                        const MAX_IMPORT_ITEMS = 50;
                        if (history.length > MAX_IMPORT_ITEMS) {
                            if (!confirm(`导入的历史记录项超过${MAX_IMPORT_ITEMS}条，是否继续？`)) {
                                return;
                            }
                        }

                        // 获取现有历史记录
                        let existingHistory = StorageManager.get('requestHistory', []);

                        // 合并历史记录
                        const mergedHistory = [...existingHistory, ...history];

                        // 去重，保留最新的记录
                        const uniqueHistory = Array.from(new Map(mergedHistory.map(item => [item.url + JSON.stringify(item.headers), item])).values());

                        // 限制历史记录数量
                        const finalHistory = uniqueHistory.slice(-MAX_HISTORY_ITEMS);

                        // 保存到localStorage
                        StorageManager.set('requestHistory', finalHistory);

                        alert('历史记录导入成功');
                        updateHistoryDisplay();
                    } catch (error) {
                        alert('导入历史记录时发生错误: ' + error.message);
                    }
                };

                reader.readAsText(file);
            });

            fileInput.click();
            document.body.removeChild(fileInput);
        }
