<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>WebCurl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            min-width: 800px;
            margin: 0 auto;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow-x: auto;
        }

        .request-section {
            margin-bottom: 20px;
        }

        /* ========== 请求Tab栏样式 ========== */

        /* 请求Tab栏容器 */
        .request-tabs-bar {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 10px 10px 0 0;
            margin-bottom: 0;
            border: 2px solid #e9ecef;
            border-bottom: 1px solid #dee2e6;
            padding: 0;
            position: relative;
            overflow: hidden;
            height: 38px;
        }

        /* Tab滚动箭头按钮 */
        .tab-scroll-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 100%;
            background: linear-gradient(90deg, rgba(248, 249, 250, 0.95) 0%, rgba(233, 236, 239, 0.9) 100%);
            border: none;
            cursor: pointer;
            color: #667eea;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;
            flex-shrink: 0;
            z-index: 10;
            user-select: none;
        }

        .tab-scroll-btn:hover {
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.2) 0%, rgba(102, 126, 234, 0.15) 100%);
            color: #764ba2;
        }

        .tab-scroll-btn:active {
            transform: scale(0.95);
        }

        .tab-scroll-btn.show {
            display: flex;
        }

        .tab-scroll-btn.disabled {
            color: #adb5bd;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #tabScrollLeft {
            border-radius: 10px 0 0 0;
            background: linear-gradient(90deg, rgba(248, 249, 250, 1) 70%, rgba(248, 249, 250, 0) 100%);
            padding-right: 4px;
        }

        #tabScrollRight {
            border-radius: 0 0 0 0;
            background: linear-gradient(270deg, rgba(248, 249, 250, 1) 70%, rgba(248, 249, 250, 0) 100%);
            padding-left: 4px;
        }

        /* Tab列表容器 */
        .request-tabs-list {
            display: flex;
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }

        .request-tabs-list::-webkit-scrollbar {
            display: none;
        }

        /* 单个请求Tab */
        .request-tab-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            background: transparent;
            color: #636e72;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border-right: 1px solid #dee2e6;
            white-space: nowrap;
            transition: all 0.2s ease;
            min-width: 70px;
            max-width: 160px;
            height: 100%;
        }

        .request-tab-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .request-tab-item.active {
            background: #ffffff;
            color: #667eea;
            font-weight: 600;
        }

        /* Tab中的HTTP方法标签 */
        .tab-method {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 4px;
            border-radius: 3px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .tab-method.get {
            background: #d4edda;
            color: #155724;
        }

        .tab-method.post {
            background: #cce5ff;
            color: #004085;
        }

        .tab-method.put {
            background: #fff3cd;
            color: #856404;
        }

        .tab-method.delete {
            background: #f8d7da;
            color: #721c24;
        }

        .tab-method.patch {
            background: #e2d5f1;
            color: #6f42c1;
        }

        .tab-method.head,
        .tab-method.options {
            background: #e2e3e5;
            color: #383d41;
        }

        .tab-method.ws {
            background: #d1ecf1;
            color: #0c5460;
        }

        .tab-method.sse {
            background: #d1ecf1;
            color: #0c5460;
        }

        /* Tab名称 */
        .tab-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Tab关闭按钮 */
        .tab-close-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: transparent;
            color: #adb5bd;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .tab-close-btn:hover {
            background: #ff7675;
            color: white;
        }

        /* 新建Tab按钮 */
        .new-tab-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #667eea;
            font-size: 18px;
            font-weight: 300;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin: 0 2px;
        }

        .new-tab-btn:hover {
            background: rgba(102, 126, 234, 0.15);
            border-radius: 8px;
        }

        .url-section {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            padding: 10px;
            background: #ffffff;
            border: 2px solid #e9ecef;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .url-section select,
        .url-section input,
        .url-section button {
            padding: 8px 12px;
            font-size: 13px;
        }

        .url-section select {
            width: 90px;
        }

        .url-section input[type="url"] {
            flex: 1;
        }

        select,
        input,
        textarea,
        button {
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        select {
            width: 100px;
            background: #ffffff;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input[type="url"] {
            flex: 1;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #b2bec3 0%, #636e72 100%);
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
            box-shadow: none;
        }

        .loading {
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .send-btn-group {
            display: flex;
            position: relative;
        }

        .send-btn-group #sendBtn {
            border-radius: 10px 0 0 10px;
            padding: 10px 20px;
        }

        .send-btn-dropdown {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0 10px 10px 0;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 10px;
            min-width: 32px;
        }

        .send-btn-dropdown:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }

        .send-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            z-index: 100;
            min-width: 120px;
            overflow: hidden;
        }

        .send-dropdown-menu.show {
            display: block;
        }

        .send-dropdown-menu div {
            padding: 12px 16px;
            cursor: pointer;
            color: #2d3436;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .send-dropdown-menu div:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .send-btn-group.loading-group .send-btn-dropdown {
            display: none;
        }

        .send-btn-group.loading-group #sendBtn {
            border-radius: 10px;
        }

        .request-tabs,
        .response-tabs,
        .panel-tabs {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 15px;
            gap: 4px;
        }

        .request-tab,
        .response-tab {
            padding: 4px 6px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px 5px 0 0;
            background: #f8f9fa;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .request-tab:hover,
        .response-tab:hover {
            background: #e9ecef;
        }

        .request-tab.active,
        .response-tab.active {
            border: 2px solid #667eea;
            border-bottom: 1px solid #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            min-height: 300px;
        }

        .tab-content.active,
        .response-tab-content.active,
        .panel-content.active {
            display: block;
        }

        .header-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .header-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            accent-color: #667eea;
        }

        .header-row input[type="text"] {
            flex: 1;
        }

        .remove-btn {
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%) !important;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3) !important;
        }

        .remove-btn:hover {
            box-shadow: 0 6px 20px rgba(214, 48, 49, 0.4) !important;
        }

        .response-section {
            margin-top: 20px;
            border-top: 2px solid #e9ecef;
            padding-top: 20px;
        }

        .response-info {
            margin-bottom: 15px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }

        .response-tab-content {
            display: none;
            padding: 15px 0;
        }

        #responseBody {
            width: 100%;
            min-height: 200px;
            font-family: "Fira Code", "JetBrains Mono", Consolas, monospace;
            white-space: pre-wrap;
            background: #fafbfc;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            line-height: 1.6;
        }

        .file-input-container {
            margin-top: 10px;
        }

        .headers-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        .headers-table th,
        .headers-table td {
            border: 1px solid #e9ecef;
            padding: 12px;
            text-align: left;
        }

        .headers-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }

        .headers-table tr:hover td {
            background: #f8f9fa;
        }

        .formdata-row,
        .body-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: start;
            padding: 12px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 10px;
            width: 100%;
        }

        .formdata-row input[type="checkbox"],
        .body-row input[type="radio"] {
            width: 18px;
            height: 18px;
            margin: 0;
            margin-top: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .formdata-key {
            width: 30%;
            min-width: 200px;
        }

        .formdata-type {
            width: 15%;
            min-width: 120px;
        }

        .formdata-value {
            flex: 1;
            min-width: 200px;
        }

        .formdata-value .text-input {
            width: 100%;
            height: 40px;
        }

        .formdata-value .file-input {
            width: 100%;
            height: 40px;
            padding: 6px;
            box-sizing: border-box;
        }

        .formdata-value .file-input::-webkit-file-upload-button {
            height: 26px;
            padding: 0 12px;
            margin-right: 10px;
            border: 2px solid #e9ecef;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .file-preview {
            margin-top: 5px;
            font-size: 12px;
            color: #636e72;
        }

        .file-preview-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 10px;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            color: white;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .btn-action,
        .history-load-btn {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%) !important;
            color: white !important;
            border: none !important;
            padding: 6px 12px !important;
            border-radius: 8px !important;
            cursor: pointer;
            font-size: 12px !important;
            box-shadow: 0 4px 15px rgba(116, 185, 255, 0.3) !important;
            margin-top: 10px;
            height: auto;
            white-space: nowrap;
        }

        .btn-action:hover,
        .history-load-btn:hover {
            box-shadow: 0 6px 20px rgba(116, 185, 255, 0.4) !important;
            transform: translateY(-2px);
        }

        .btn-danger-action {
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%) !important;
            color: white !important;
            border: none !important;
            padding: 6px 12px !important;
            border-radius: 8px !important;
            cursor: pointer;
            font-size: 12px !important;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3) !important;
            margin-top: 10px;
            height: auto;
            white-space: nowrap;
        }

        .btn-danger-action:hover {
            box-shadow: 0 6px 20px rgba(214, 48, 49, 0.4) !important;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #636e72 0%, #2d3436 100%) !important;
            box-shadow: 0 4px 15px rgba(45, 52, 54, 0.3) !important;
        }

        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(45, 52, 54, 0.4) !important;
        }

        .container-hidden {
            display: none;
        }

        .container-margin-top {
            margin-top: 10px;
        }

        .input-remark {
            width: 80px;
        }

        .input-ws-send {
            width: 60%;
        }

        .table-col-enable {
            width: 40px;
        }

        .table-col-action {
            width: 55px;
        }

        .textarea-body,
        .body-content textarea {
            width: 100%;
            height: 150px;
            font-family: "Fira Code", "JetBrains Mono", Consolas, monospace;
            resize: vertical;
            background: #fafbfc;
            border: 2px solid #e9ecef;
            border-radius: 10px;
        }

        .file-input-binary {
            width: 100%;
            height: 40px;
            padding: 6px;
            box-sizing: border-box;
        }

        .file-input-ws {
            display: none;
            width: 180px;
        }

        .select-formdata-type {
            width: 30px;
        }

        .divider {
            margin: 15px 0;
            border: none;
            border-top: 2px solid #e9ecef;
        }

        .setting-input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
        }

        .setting-input-integrity {
            display: none;
            width: 100%;
            margin-top: 5px;
        }

        .collection-selector {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .collection-selector select {
            flex: 1;
        }

        .file-input {
            display: none;
        }

        .form-remark {
            width: 80px;
        }

        .body-type-radio {
            display: inline-flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .body-type-radio label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .body-type-radio label:hover {
            background: #e9ecef;
        }

        .body-type-radio label:has(input:checked) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .body-type-radio input[type="radio"] {
            cursor: pointer;
            accent-color: #667eea;
            width: 14px;
            height: 14px;
        }

        #bodyTab {
            position: relative;
            width: 100%;
        }

        #formContainer,
        #formDataContainer {
            width: 100%;
        }

        .content-wrapper {
            display: flex;
            gap: 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .content-wrapper-expanded {
            max-width: 100%;
            justify-content: center;
            padding: 0 16px;
        }

        .aside {
            width: 30%;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-height: calc(100vh - 32px);
            overflow-y: scroll;
        }

        .aside::-webkit-scrollbar {
            width: 8px;
        }

        .aside::-webkit-scrollbar-track {
            background: #f8f9fa;
            border-radius: 4px;
        }

        .aside::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
        }

        .aside-hidden {
            display: none;
        }

        .toggle-aside-btn {
            padding: 10px 12px;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .toggle-aside-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }

        .global-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
        }

        .global-actions button {
            flex: 1;
            padding: 6px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            min-width: 70px;
        }

        .panel-tab {
            padding: 4px 6px;
            cursor: pointer;
            border: 1px solid transparent;
            flex: 1;
            text-align: center;
            border-radius: 5px 5px 0 0;
            background: #f8f9fa;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .panel-tab:hover {
            background: #e9ecef;
        }

        .panel-tab.active {
            border: 2px solid #667eea;
            border-bottom: 2px solid #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: -1px;
        }

        .panel-content {
            display: none;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-header .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .history-item {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            position: relative;
            background: #fafbfc;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-color: #667eea;
        }

        .history-method {
            font-weight: bold;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 8px;
        }

        .history-url {
            color: #636e72;
            word-break: break-all;
            margin-bottom: 5px;
        }

        .history-time {
            font-size: 12px;

            width: 100%;
            min-height: 150px;
            padding: 12px;

        }

        .hook-textarea::placeholder {
            color: #b2bec3;
        }

        .hook-console {
            margin-top: 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }

        /* Hook控制台头部 */

            display: flex;
            align-items: center;
            justify-content: space-between;

    <script>
        "use strict";
        /**
         * 全局变量：是否使用代理模式
         * @type {boolean}
         */
        let useProxy = false;

        /**
         * 函数别名称
         */
        const byId = id => document.getElementById(id);
        const docSelectAll = e => document.querySelectorAll(e);


        /**
         * 初始化代理模式状态
         * 页面加载时请求 /api/mode 接口获取当前运行模式
         * @returns {Promise<void>}
         */
        async function initUseProxy() {
            try {
                const modeResp = await fetch('/api/mode');
                if (modeResp.ok) {
                    const modeData = await modeResp.json();
                    if (modeData && modeData.mode === 'proxy') {
                        useProxy = true;
                    } else {
                        useProxy = false;
                    }
                } else {
                    useProxy = false;
                }
            } catch (e) {
                useProxy = false;
            }
        }

        /**
         * Hook脚本执行引擎
         * 负责管理和执行前置脚本（Pre-Request）和后置脚本（Post-Response）
         */
        const HookEngine = {
            /** @type {Array<{type: string, time: string, message: string}>} 控制台日志数组 */
            consoleLogs: [],

            /**
             * 记录日志到控制台
             * @param {string} type - 日志类型：info/success/error/warn
             * @param {...any} args - 日志内容
             */
            log(type, ...args) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
                const message = args.map(arg => {
                    if (typeof arg === 'object') {
                        try {
                            return JSON.stringify(arg, null, 2);
                        } catch {
                            return String(arg);
                        }
                    }
                    return String(arg);
                }).join(' ');

                this.consoleLogs.push({ type, time: timeStr, message });
                this.renderConsole();
            },

            /**
             * 渲染控制台输出
             * 将日志数组转换为HTML并显示在控制台区域
             */
            renderConsole() {
                const output = byId('hookConsoleOutput');
                if (!output) return;

                output.innerHTML = this.consoleLogs.map(log => {
                    const typeClass = log.type || 'info';
                    return `<div class="hook-console-line ${typeClass}"><span class="hook-console-time">[${log.time}]</span>${this.escapeHtml(log.message)}</div>`;
                }).join('');

                output.scrollTop = output.scrollHeight;
            },

            /**
             * HTML转义，防止XSS攻击
             * @param {string} text - 需要转义的文本
             * @returns {string} 转义后的安全文本
             */
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            /**
             * 清空控制台日志
             */
            clearConsole() {
                this.consoleLogs = [];
                this.renderConsole();
            },

            /**
             * 获取Hook脚本可用的工具函数集
             * @returns {Object} 工具函数对象
             */
            getUtils() {
                const self = this;
                return {
                    // 日志输出函数
                    log: (...args) => self.log('info', ...args),
                    info: (...args) => self.log('info', ...args),
                    success: (...args) => self.log('success', ...args),
                    warn: (...args) => self.log('warn', ...args),
                    error: (...args) => self.log('error', ...args),

                    /**
                     * 设置变量（保存到localStorage并刷新DOM）
                     * @param {string} name - 变量名
                     * @param {any} value - 变量值
                     */
                    setVariable: (name, value) => {
                        const envConf = StorageManager.get('env_conf', []);
                        const existingIndex = envConf.findIndex(v => v.env_name === name);
                        if (existingIndex >= 0) {
                            envConf[existingIndex].env_value = String(value);
                            envConf[existingIndex].enable = true;
                        } else {
                            envConf.push({ row_id: Date.now(), enable: true, env_name: name, env_value: String(value) });
                        }
                        StorageManager.set('env_conf', envConf);
                        // 刷新变量表格DOM
                        if (typeof loadVariables === 'function') {
                            loadVariables();
                        }
                        self.log('success', `变量已设置: ${name} = ${value}`);
                    },

                    /**
                     * 获取变量值（只获取启用的变量）
                     * @param {string} name - 变量名
                     * @returns {string|undefined} 变量值
                     */
                    getVariable: (name) => {
                        const envConf = StorageManager.get('env_conf', []);
                        const found = envConf.find(v => v.env_name === name && v.enable !== false);
                        return found ? found.env_value : undefined;
                    },

                    /**
                     * 获取所有启用的变量
                     * @returns {Object} 变量键值对对象
                     */
                    getAllVariables: () => {
                        const envConf = StorageManager.get('env_conf', []);
                        const result = {};
                        envConf.filter(v => v.enable !== false).forEach(v => { result[v.env_name] = v.env_value; });
                        return result;
                    },

                    /**
                     * 设置全局请求头（保存到localStorage并刷新DOM）
                     * @param {string} name - 请求头名称
                     * @param {string} value - 请求头值
                     */
                    setGlobalHeader: (name, value) => {
                        const headerConf = StorageManager.get('header_conf', []);
                        const existingIndex = headerConf.findIndex(h => h.header_name === name);
                        if (existingIndex >= 0) {
                            headerConf[existingIndex].header_value = String(value);
                            headerConf[existingIndex].enable = true;
                        } else {
                            headerConf.push({ row_id: Date.now(), enable: true, header_name: name, header_value: String(value) });
                        }
                        StorageManager.set('header_conf', headerConf);
                        // 刷新全局请求头表格DOM
                        if (typeof loadGlobalHeaders === 'function') {
                            loadGlobalHeaders();
                        }
                        self.log('success', `全局请求头已设置: ${name} = ${value}`);
                    },

                    /**
                     * 获取全局请求头值（只获取启用的请求头）
                     * @param {string} name - 请求头名称
                     * @returns {string|undefined} 请求头值
                     */
                    getGlobalHeader: (name) => {
                        const headerConf = StorageManager.get('header_conf', []);
                        const found = headerConf.find(h => h.header_name === name && h.enable !== false);
                        return found ? found.header_value : undefined;
                    },

                    /**
                     * 获取所有启用的全局请求头
                     * @returns {Object} 全局请求头键值对对象
                     */
                    getAllGlobalHeaders: () => {
                        const headerConf = StorageManager.get('header_conf', []);
                        const result = {};
                        headerConf.filter(h => h.enable !== false).forEach(h => { result[h.header_name] = h.header_value; });
                        return result;
                    },
                };
            },

            /**
             * 执行前置脚本（Pre-Request Hook）
             * 在请求发送前执行，可修改请求参数
             * @param {Object} request - 请求对象
             * @returns {Promise<Object>} 处理后的请求对象
             */
            async executePreRequest(request) {
                const scriptText = byId('preRequestScript')?.value || '';
                const enabled = byId('preRequestEnabled')?.checked !== false;

                // 如果未启用或脚本为空，直接返回原请求
                if (!enabled || !scriptText.trim()) {
                    return request;
                }

                this.log('info', '执行 Pre-Request Hook...');

                try {
                    const utils = this.getUtils();
                    // 构建传递给脚本的请求对象
                    const requestObj = {
                        url: request.url,
                        method: request.method,
                        headers: { ...request.headers },
                        body: request.body,
                        bodyType: request.bodyType,
                        settings: { ...request.settings },
                        variables: utils.getAllVariables(),
                        utils
                    };

                    // 包装脚本，使其能够被Function构造函数执行
                    const wrappedScript = `
                        ${scriptText}
                        return (typeof preRequest === 'function') ? preRequest(request) : request;
                    `;

                    // 执行脚本
                    const fn = new Function('request', wrappedScript);
                    const result = await fn(requestObj);

                    // 如果脚本返回了有效的对象，合并修改
                    if (result && typeof result === 'object') {
                        this.log('success', 'Pre-Request Hook 执行完成');
                        return {
                            ...request,
                            url: result.url || request.url,
                            method: result.method || request.method,
                            headers: result.headers || request.headers,
                            body: result.body !== undefined ? result.body : request.body,
                            settings: result.settings || request.settings
                        };
                    }

                    return request;
                } catch (error) {
                    this.log('error', `Pre-Request Hook 执行错误: ${error.message}`);
                    console.error('Pre-Request Hook Error:', error);
                    return request;
                }
            },

            /**
             * 执行后置脚本（Post-Response Hook）
             * 在响应返回后执行，可处理响应数据
             * @param {Object} response - 响应对象
             * @returns {Promise<Object>} 处理后的响应对象
             */
            async executePostResponse(response) {
                const scriptText = byId('postResponseScript')?.value || '';
                const enabled = byId('postResponseEnabled')?.checked !== false;

                // 如果未启用或脚本为空，直接返回原响应
                if (!enabled || !scriptText.trim()) {
                    return response;
                }

                this.log('info', '执行 Post-Response Hook...');

                try {
                    const utils = this.getUtils();
                    // 尝试解析JSON响应
                    let json = null;
                    try {
                        if (response.body && typeof response.body === 'string') {
                            json = JSON.parse(response.body);
                        }
                    } catch {
                        // 响应不是JSON格式
                    }

                    // 构建传递给脚本的响应对象
                    const responseObj = {
                        status: response.status,
                        statusText: response.statusText,
                        headers: { ...response.headers },
                        body: response.body,
                        duration: response.duration,
                        contentType: response.contentType,
                        json,
                        utils
                    };

                    // 包装脚本，使其能够被Function构造函数执行
                    const wrappedScript = `
                        ${scriptText}
                        return (typeof postResponse === 'function') ? postResponse(response) : response;
                    `;

                    // 执行脚本
                    const fn = new Function('response', wrappedScript);
                    const result = await fn(responseObj);

                    // 如果脚本返回了有效的对象，合并修改
                    if (result && typeof result === 'object') {
                        this.log('success', 'Post-Response Hook 执行完成');
                        return {
                            ...response,
                            body: result.body !== undefined ? result.body : response.body
                        };
                    }

                    return response;
                } catch (error) {
                    this.log('error', `Post-Response Hook 执行错误: ${error.message}`);
                    console.error('Post-Response Hook Error:', error);
                    return response;
                }
            },

            /**

                    }

                    const preScript = byId('preRequestScript');
                    if (preEnabled) preEnabled.checked = hooks.preRequest.enabled !== false;
                    if (preScript) preScript.value = hooks.preRequest.script || '';
                }
                if (hooks.postResponse) {
                    const postEnabled = byId('postResponseEnabled');
                    const postScript = byId('postResponseScript');
                    if (postEnabled) postEnabled.checked = hooks.postResponse.enabled !== false;
                    if (postScript) postScript.value = hooks.postResponse.script || '';

        /**

        const HookExamples = {

function preRequest(request) {

    const nonce = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {

                timestamp: `// 添加时间戳示例

            },
            postResponse: {
                extractToken: `// 提取Token示例
function postResponse(response) {
    const utils = response.utils;

    if (response.status === 200 && response.json) {

        function switchRequestTab(tabName) {

        /**

         * @param {string} type - 请求体类型，可选值：'none', 'json', 'text', 'binary', 'form', 'formdata', 'websocket'
         */
        function updateBodyType(type) {
            const jsonBodyContainer = byId('jsonBodyContainer');
            const textBodyContainer = byId('textBodyContainer');
            const binaryBodyContainer = byId('binaryBodyContainer');
            const formDataContainer = byId('formDataContainer');
            const formContainer = byId('formContainer');
            const wsControls = byId('wsControls');
            const wsBodyContainer = byId('wsBodyContainer');

            // 隐藏所有容器
            jsonBodyContainer.style.display = 'none';
            textBodyContainer.style.display = 'none';
            binaryBodyContainer.style.display = 'none';
            formDataContainer.style.display = 'none';
            formContainer.style.display = 'none';
            wsControls.style.display = 'none';
            wsBodyContainer.style.display = 'none';

            switch (type) {
                case 'json':
                    jsonBodyContainer.style.display = 'block';
                    // 如果没有行，添加一个默认行
                    if (byId('jsonBodyRows').children.length === 0) {
                        addJsonBodyRow();
                    }
                    break;
                case 'text':
                    textBodyContainer.style.display = 'block';
                    // 如果没有行，添加一个默认行
                    if (byId('textBodyRows').children.length === 0) {
                        addTextBodyRow();
                    }
                    break;
                case 'binary':
                    binaryBodyContainer.style.display = 'block';
                    // 如果没有行，添加一个默认行
                    if (byId('binaryBodyRows').children.length === 0) {
                        addBinaryBodyRow();
                    }
                    break;
                case 'form':
                    formContainer.style.display = 'block';
                    break;
                case 'formdata':
                    formDataContainer.style.display = 'block';
                    break;
                case 'websocket':
                    wsBodyContainer.style.display = 'block';
                    if (byId('wsBodyRows').children.length === 0) {
                        addWsBodyRow();
                    }
                    break;
                case 'none':
                default:
                    // 无请求体，所有容器都隐藏
                    break;

        function handleFormDataFileChange(e) {

            if (file) {

        /**

         * @returns {HTMLElement} 创建的JSON请求体行元素

            const row = document.createElement('div');
            row.className = 'body-row';
            row.innerHTML = `

                    <textarea placeholder="{}" class="textarea-body json-body-textarea"></textarea>

                    <button class="remove-btn" onclick="removeBodyRow(this, 'json')">删除</button>
                </div>
            `;
            return row;
        }

        /**
         * 格式化JSON请求体行
         * 将当前行的JSON文本解析并渲染为可折叠的高亮DOM结构
         * 隐藏原始textarea，显示格式化容器，切换按钮显示状态
         * @param {HTMLElement} btn - 触发格式化的按钮元素
         * @returns {void}
         */
        function formatJsonBodyRow(btn) {
            const btnGroup = btn.closest('.json-body-btn-group');
            const bodyRow = btn.closest('.body-row');
            const bodyContent = bodyRow.querySelector('.body-content');
            const textarea = bodyRow.querySelector('.json-body-textarea');
            const formattedContainer = bodyRow.querySelector('.json-body-formatted');
            const showRawBtn = btnGroup.querySelector('.json-show-raw-btn');

            try {
                const rawJson = textarea.value.trim();
                if (!rawJson) {
                    alert('没有JSON内容可格式化');
                    return;
                }

                const jsonObj = JSON.parse(rawJson);

                const textareaHeight = textarea.offsetHeight;
                bodyContent.style.height = textareaHeight + 'px';

                formattedContainer.innerHTML = '';
                const container = document.createElement('div');
                container.className = 'json-formatted';
                processValue(container, jsonObj);
                formattedContainer.appendChild(container);

                textarea.style.display = 'none';
                formattedContainer.style.display = 'block';
                btn.style.display = 'none';
                showRawBtn.style.display = 'inline-block';

            } catch (error) {
                alert('JSON格式错误: ' + (error.message || error));
            }
        }

        /**

         * 隐藏格式化容器，显示原始textarea，切换按钮显示状态
         * 与formatJsonBodyRow函数互斥，用于从格式化视图切换回原始编辑视图
         * @param {HTMLElement} btn - 触发显示原始文本的按钮元素

        function showRawJsonBodyRow(btn) {

            const bodyRow = btn.closest('.body-row');
            const bodyContent = bodyRow.querySelector('.body-content');
            const textarea = bodyRow.querySelector('.json-body-textarea');
            const formattedContainer = bodyRow.querySelector('.json-body-formatted');

        /**

        function addBinaryBodyRow() {
            const container = byId('binaryBodyRows');

        /**

         * 如果没有行了，则添加一个默认行
         * @param {HTMLElement} button - 删除按钮元素
         * @param {string} type - 请求体类型，用于确定添加哪种类型的默认行
         */
        function removeBodyRow(button, type) {
            const row = button.closest('.body-row');
            const container = row.parentElement;
            const wasSelected = row.querySelector('input[type="radio"]').checked;

            row.remove();

            // 如果删除的是选中的行，且还有其他行，则选中第一行
            if (wasSelected && container.children.length > 0) {
                container.children[0].querySelector('input[type="radio"]').checked = true;
            }

            // 如果没有行了，添加一个默认行
            if (container.children.length === 0) {
                switch (type) {
                    case 'json':
                        addJsonBodyRow();

                    case 'text':
                        addTextBodyRow();

                    case 'binary':
                        addBinaryBodyRow();

        /**

         * @param {HTMLSelectElement} select - 类型选择下拉框元素
         */
        function handleTypeChange(select) {
            const row = select.closest('.formdata-row');
            const textInput = row.querySelector('.text-input');
            const fileInput = row.querySelector('.file-input');
            const filePreview = row.querySelector('.file-preview');

            if (select.value === 'text') {
                textInput.style.display = 'block';
                fileInput.style.display = 'none';
                filePreview.style.display = 'none';
                fileInput.value = ''; // 清除已选文件
            } else {
                textInput.style.display = 'none';
                fileInput.style.display = 'block';
                filePreview.style.display = 'block';

        /**

        function addFormRow() {

            formRow.className = 'header-row';
            formRow.innerHTML = `
                <input type="checkbox" checked>
                <input type="text" placeholder="参数名称"/>
                <input type="text" placeholder="参数值"/>
                <input type="text" placeholder="备注" class="form-remark input-remark"/>
                <button class="remove-btn" onclick="removeFormRow(this)">删除</button>
            `;
            byId('formRows').appendChild(formRow);
        }

        /**
         * 删除表单行
         * @param {HTMLElement} button - 删除按钮元素
         */
        function removeFormRow(button) {
            button.closest('.header-row').remove();
        }

        /**
         * 获取当前选择的请求体类型
         * @returns {string} 请求体类型，如果没有选择则返回 'none'
         */
        function getBodyType() {
            const checkedRadio = document.querySelector('input[name="bodyType"]:checked');
            return checkedRadio ? checkedRadio.value : 'none';
        }

        /**
         * 构建请求头
         * 获取并处理用户自定义请求头和全局请求头
         * @returns {Promise<Object>} 处理后的请求头对象
         */
        async function buildRequestHeaders() {
            // 获取用户自定义请求头
            const customHeaders = {};
            docSelectAll('#headersList .header-row').forEach(row => {
                const inputs = row.getElementsByTagName('input');
                const isEnabled = inputs[0]?.checked;
                const key = inputs[1]?.value;
                const value = inputs[2]?.value;

                if (isEnabled && key) {
                    // 替换header的key和value中的变量
                    const normalizedKey = replaceVariables(key)?.trim();
                    const normalizedValue = replaceVariables(value || '')?.trim();

                    // 验证header名称
                    if (normalizedKey) {
                        if (!/^[a-zA-Z0-9\-]+$/.test(normalizedKey)) {
                            throw new Error(`无效的请求头名称: ${normalizedKey}`);
                        }

                        // 规范化header名称（首字母大写，其余小写）
                        const finalKey = normalizedKey.split('-').map(part =>
                            part.charAt(0).toUpperCase() + part.slice(1).toLowerCase()
                        ).join('-');
                        customHeaders[finalKey] = normalizedValue;
                    }
                }
            });

            // 获取全局请求头并规范化
            const globalHeaders = {};
            const rawGlobalHeaders = getGlobalHeaders();
            for (const [key, value] of Object.entries(rawGlobalHeaders)) {
                if (key) {
                    const normalizedKey = key.split('-').map(part =>
                        part.charAt(0).toUpperCase() + part.slice(1).toLowerCase()
                    ).join('-');
                    globalHeaders[normalizedKey] = value;
                }
            }

            // 合并请求头，用户自定义的优先级更高
            const headers = { ...globalHeaders, ...customHeaders };

            // 验证所有请求头名称
            for (const key of Object.keys(headers)) {
                if (key && !/^[a-zA-Z0-9\-]+$/.test(key)) {
                    throw new Error(`无效的请求头名称: ${key}`);
                }
            }

            return headers;
        }

        /**
         * 规范化URL协议
         * 为URL添加默认协议前缀，支持http/https/ws/wss协议
         * @param {string} url - 原始URL
         * @param {string} protocol - 默认协议（http或https）
         * @returns {string} 规范化后的URL
         */
        function normalizeUrlWithProtocol(url, protocol) {
            if (!url) return url;
            // 只判断常用的四种协议
            if (/^(https?|wss?):\/\//i.test(url)) return url;
            if (url.startsWith('//')) return protocol + ':' + url;
            return protocol + '://' + url;
        }

        /**
         * 处理代理请求
         * 
         * 当useProxy为true时，请求通过后端代理转发
         * 代理模式支持：跨域请求、自定义SSL验证、重定向控制等
         * 
         * 核心流程：
         * 1. 构建FormData包含请求参数
         * 2. 发送到 /api/forward 接口
         * 3. 处理响应并执行后置Hook
         * 4. 根据Tab状态决定更新界面还是保存数据
         * 
         * @param {string} url - 目标URL
         * @param {string} method - 请求方法
         * @param {string} bodyType - 请求体类型
         * @param {Object} headers - 请求头
         * @param {Object} settings - 请求设置
         * @param {boolean} download - 是否为下载请求
         * @param {AbortSignal} signal - AbortController 的信号
         * @param {string} currentTabId - 发起请求的Tab ID
         * @returns {Promise<void>}
         */
        async function handleProxyRequest(url, method, bodyType, headers, settings, download, signal, requestBody, currentTabId) {
            const formData = new FormData();
            formData.append('url', url);
            formData.append('method', method);
            formData.append('body_type', bodyType === 'formdata' ? 'form-data' : (bodyType === 'form' ? 'x-www-form-urlencoded' : bodyType));

            const headersArr = Object.entries(headers).map(([name, value]) => ({ name, value }));
            formData.append('headers', JSON.stringify(headersArr));
            formData.append('time_out', settings.timeout || '0');
            formData.append('verify_ssl', settings.verify_ssl || 'N');
            formData.append('follow_redirect', settings.follow_redirect || 'N');
            formData.append('retry_count', settings.retry_count || '0');
            formData.append('retry_delay', settings.retry_delay || '0');
            formData.append('stream', settings.stream || 'false');

            const filesInfo = [];
            await processRequestBodyWithBody(formData, bodyType, filesInfo, requestBody);

            if (filesInfo.length > 0) {
                formData.append('file_info', JSON.stringify(filesInfo));
            }

            try {
                const startTime = Date.now();
                const response = await fetch('/api/forward', {
                    method: 'POST',
                    body: formData,
                    signal: signal
                });
                const duration = Date.now() - startTime;
                const contentType = response.headers.get('content-type');

                // 检查是否为流式响应
                if (settings.stream === 'true') {
                    await handleStreamResponse(response, currentTabId);
                    saveRequestToHistory();
                    return;
                }

                if (contentType?.includes('text/event-stream')) {
                    await handleSSEFetchResponse(response, currentTabId);
                    saveRequestToHistory();
                    return;
                }

                const responseHeaders = {};
                response.headers.forEach((value, key) => {
                    responseHeaders[key] = value;
                });

                let responseText = '';
                const binaryTypes = [
                    'application/octet-stream',
                    'application/pdf',
                    'image/',
                    'audio/',
                    'video/',
                    'application/zip',
                    'application/x-rar'
                ];
                const isBinaryContent = contentType && binaryTypes.some(type => contentType.includes(type));

                if (!isBinaryContent) {
                    responseText = await response.text();
                }

                const hookResponse = await HookEngine.executePostResponse({
                    status: response.status,
                    statusText: response.statusText,
                    headers: responseHeaders,
                    body: responseText,
                    duration,
                    contentType
                });

                if (hookResponse.body !== undefined && hookResponse.body !== responseText) {
                    responseText = hookResponse.body;
                }

                // 检查是否还在同一个Tab
                if (RequestTabManager.activeTabId === currentTabId) {
                    if (download) {
                        await handleDownloadResponse(response, contentType);
                    } else {
                        await handleNormalResponseWithBody(response, duration, contentType, responseText, isBinaryContent);
                    }
                    await updateResponseHeaders(response);
                    RequestTabManager.saveCurrentResponseData();
                } else {
                    // 不在同一个Tab，将响应数据保存到发起请求的Tab中
                    RequestTabManager.saveResponseToTab(currentTabId, {
                        status: response.status,
                        statusText: response.statusText,
                        headers: responseHeaders,
                        body: responseText,
                        duration,
                        contentType
                    });
                }

                saveRequestToHistory();
            } catch (error) {
                if (error.name !== 'AbortError' && RequestTabManager.activeTabId === currentTabId) {
                    await handleRequestError(error);
                }
            } finally {
                RequestTabManager.clearTabLoadingState(currentTabId);
            }
        }

        /**
         * 处理请求体（支持Hook修改后的请求体）
         * 如果Hook修改了请求体，则使用修改后的值；否则使用原始处理逻辑
         * @param {FormData} formData - FormData对象
         * @param {string} bodyType - 请求体类型
         * @param {Array} filesInfo - 文件信息数组
         * @param {string} requestBody - Hook修改后的请求体
         * @returns {Promise<void>}
         */
        async function processRequestBodyWithBody(formData, bodyType, filesInfo, requestBody) {
            if (requestBody) {
                if (bodyType === 'json' || bodyType === 'text' || bodyType === 'xml') {
                    formData.append('body', requestBody);
                }
                return;
            }
            await processRequestBody(formData, bodyType, filesInfo);
        }

        /**
         * 处理请求体
         * 根据请求体类型处理不同的数据
         * @param {FormData} formData - FormData对象
         * @param {string} bodyType - 请求体类型
         * @param {Array} filesInfo - 文件信息数组
         * @returns {Promise<void>}
         */
        async function processRequestBody(formData, bodyType, filesInfo) {
            switch (bodyType) {
                case 'formdata': {
                    const formDataRows = docSelectAll('.formdata-row');
                    for (const row of formDataRows) {
                        const isEnabled = row.querySelector('input[type="checkbox"]')?.checked;
                        if (!isEnabled) continue;

                        const key = row.querySelector('.formdata-key')?.value;
                        const type = row.querySelector('.formdata-type')?.value;
                        if (!key) continue;

                        if (type === 'text') {
                            const value = row.querySelector('.text-input')?.value || '';
                            formData.append(key, value);
                        } else if (type === 'file') {
                            const fileInput = row.querySelector('.file-input');
                            if (fileInput?.files.length > 0) {
                                for (const file of fileInput.files) {
                                    formData.append('files', file);
                                    filesInfo.push({ field_name: key, file_name: file.name });
                                }
                            } else {
                                formData.append(key, '');
                            }
                        }
                    }
                    break;
                }
                case 'form': {
                    const formRows = docSelectAll('#formRows .header-row');
                    for (const row of formRows) {
                        const inputs = row.getElementsByTagName('input');
                        const isEnabled = inputs[0]?.checked;
                        const key = inputs[1]?.value;
                        if (isEnabled && key) {
                            formData.append(key, inputs[2]?.value || '');
                        }
                    }
                    break;
                }
                case 'json':
                case 'text':
                case 'xml': {
                    const bodyContent = await getRequestBody(bodyType);
                    if (bodyContent) {
                        formData.append('body', bodyContent);
                    }
                    break;
                }
                case 'binary': {
                    const selectedRow = document.querySelector('#binaryBodyRows input[type="radio"]:checked');
                    if (selectedRow) {
                        const fileInput = selectedRow.closest('.body-row').querySelector('input[type="file"]');
                        if (fileInput?.files.length > 0) {
                            const file = fileInput.files[0];
                            formData.append('files', file);
                            filesInfo.push({ field_name: 'files', file_name: file.name });
                        }
                    }
                    break;
                }
            }
        }

        /**
         * 更新响应头显示
         * @param {Response} response - fetch响应对象
         * @returns {Promise<void>}
         */
        async function updateResponseHeaders(response) {
            const responseHeadersTable = byId('responseHeaders')?.getElementsByTagName('tbody')[0];
            if (!responseHeadersTable) return;

            responseHeadersTable.innerHTML = '';

            const allHeaders = response.headers.get('X-Response-Headers');
            if (allHeaders) {
                try {
                    const headers = JSON.parse(allHeaders);
                    for (const [key, values] of Object.entries(headers)) {
                        const row = responseHeadersTable.insertRow();
                        row.insertCell(0).textContent = key;
                        row.insertCell(1).textContent = Array.isArray(values) ? values.join(', ') : values;
                    }
                } catch (e) {
                    console.error('解析响应头失败:', e);
                }
            } else {
                // 回退到原始方式
                response.headers.forEach((value, key) => {
                    const row = responseHeadersTable.insertRow();
                    row.insertCell(0).textContent = key;
                    row.insertCell(1).textContent = value;
                });
            }
        }

        /**
         * 处理请求错误
         * @param {Error} error - 错误对象
         * @returns {Promise<void>}
         */
        async function handleRequestError(error) {
            const responseInfo = byId('responseInfo');
            const responseBody = byId('responseBody');
            const responseHeaders = byId('responseHeaders');

            if (responseInfo) {
                if (error.name === 'AbortError') {
                    responseInfo.innerHTML = '请求已取消';
                    responseInfo.className = 'response-info httpStatus4';
                } else {
                    responseInfo.innerHTML = `请求错误: ${error.message}`;
                }
            }
            if (responseBody) {
                responseBody.value = '';
            }
            if (responseHeaders) {
                const tbody = responseHeaders.getElementsByTagName('tbody')[0];
                if (tbody) {
                    tbody.innerHTML = '';
                }
            }
        }

        /**
         * 处理WebSocket/SSE请求
         * 
         * WebSocket和SSE连接通过后端代理建立
         * 后端返回connect_id，前端通过该ID建立实际连接
         * 
         * 核心流程：
         * 1. 关闭该Tab已有的WS/SSE连接
         * 2. 发送请求到 /api/forward 获取 connect_id
         * 3. 根据 method 建立 WS 或 SSE 连接
         * 
         * @param {string} url - 目标URL
         * @param {string} method - 请求方法 (WS/SSE)
         * @param {Object} headers - 请求头
         * @param {Object} settings - 请求设置
         * @param {AbortSignal} signal - AbortController 的信号
         * @param {string} currentTabId - 发起请求的Tab ID
         * @returns {Promise<void>}
         */
        async function handleWSRequest(url, method, headers, settings, signal, currentTabId) {
            // 【关键】获取发起请求的Tab并关闭已有连接
            // 使用 currentTabId 而不是 activeTabId，确保操作正确的Tab
            const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
            if (tab) {
                if (tab.ws) {
                    try { tab.ws.close(); } catch (e) { }
                    tab.ws = null;
                }
                if (tab.sse) {
                    try { tab.sse.close(); } catch (e) { }
                    tab.sse = null;
                }
            }

            // 【关键】只有在当前Tab是发起请求的Tab时才清空响应区域
            // 这解决了多Tab切换时响应内容串扰的问题
            if (RequestTabManager.activeTabId === currentTabId) {
                const responseInfo = byId('responseInfo');
                const responseBody = byId('responseBody');
                const responseHeaders = byId('responseHeaders');

                if (responseInfo) responseInfo.innerHTML = '';
                if (responseBody) responseBody.value = '';
                if (responseHeaders) {
                    const tbody = responseHeaders.getElementsByTagName('tbody')[0];
                    if (tbody) tbody.innerHTML = '';
                }
            }

            // 构造 formData
            const formData = new FormData();
            formData.append('url', url);
            formData.append('method', method);
            formData.append('body_type', 'none');
            const headersArr = Object.entries(headers).map(([name, value]) => ({ name, value }));
            formData.append('headers', JSON.stringify(headersArr));
            formData.append('time_out', settings.timeout || '0');
            formData.append('verify_ssl', settings.verify_ssl || 'N');
            formData.append('follow_redirect', settings.follow_redirect || 'N');
            formData.append('retry_count', settings.retry_count || '0');
            formData.append('retry_delay', settings.retry_delay || '0');

            try {
                const resp = await fetch('/api/forward', { method: 'POST', body: formData, signal: signal });
                const data = await resp.json();
                if (data.code !== 0) {
                    // 【关键】先更新Tab的响应数据
                    const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                    if (tab) {
                        tab.response.status = 0;
                        tab.response.statusText = '连接失败: ' + (data.msg || '未知错误');
                    }
                    // 只有在同一个Tab时才更新界面
                    if (RequestTabManager.activeTabId === currentTabId) {
                        const responseInfo = byId('responseInfo');
                        if (responseInfo) {
                            responseInfo.innerHTML = '连接失败: ' + (data.msg || '未知错误');
                        }
                    }
                    return;
                }

                const connect_id = data.connect_id;
                if (method === 'WS') {
                    await establishWSConnection(connect_id, currentTabId);
                } else if (method === 'SSE') {
                    await establishSSEConnection(connect_id, currentTabId);
                }
            } catch (err) {
                // 【关键】先更新Tab的响应数据
                const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                if (tab) {
                    if (err.name === 'AbortError') {
                        tab.response.status = 0;
                        tab.response.statusText = '请求已取消';
                    } else {
                        tab.response.status = 0;
                        tab.response.statusText = '请求错误: ' + (err.message || err);
                    }
                }
                // 只有在同一个Tab时才显示错误
                if (RequestTabManager.activeTabId === currentTabId) {
                    const responseInfo = byId('responseInfo');
                    if (responseInfo) {
                        if (err.name === 'AbortError') {
                            responseInfo.innerHTML = '请求已取消';
                            responseInfo.className = 'response-info httpStatus4';
                        } else {
                            responseInfo.innerHTML = '请求错误: ' + (err.message || err);
                        }
                    }
                }
                console.error('WS/SSE请求错误:', err);
            }
        }

        /**
         * 关闭当前Tab的WebSocket连接
         */
        function closeCurrentWS() {
            const tab = RequestTabManager.tabs.find(t => t.id === RequestTabManager.activeTabId);
            if (tab && tab.ws) {
                try {
                    tab.ws.close();
                } catch (e) {
                    console.warn('关闭WS连接时出错:', e);
                }
                tab.ws = null;
            }
        }

        /**
         * 建立WebSocket连接
         * @param {string} connect_id - 连接ID
         * @param {string} currentTabId - 发起请求的Tab ID
         * @returns {Promise<void>}
         */
        async function establishWSConnection(connect_id, currentTabId) {
            const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
            const wsUrl = `${wsProto}://${location.host}/api/forward-ws?connect_id=${connect_id}`;
            const ws = new WebSocket(wsUrl);

            // 记录连接开始时间
            const connectionStartTime = Date.now();

            // 保存到发起请求的Tab
            const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
            if (tab) {
                tab.ws = ws;
            }

            // 只有在同一个Tab时才更新界面
            if (RequestTabManager.activeTabId === currentTabId) {
                const responseBody = byId('responseBody');
                if (responseBody) responseBody.value = '';
            }

            ws.onopen = function () {
                // 【关键】设置Tab的响应状态，确保切换Tab时不会被清空
                const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                if (tab) {
                    tab.response.status = 101;
                    tab.response.statusText = 'Switching Protocols';
                    tab.response.contentType = 'websocket';
                    tab.response.duration = null; // 连接中，无持续时间
                }
                // 只有在同一个Tab时才更新界面
                if (RequestTabManager.activeTabId === currentTabId) {
                    const responseInfo = byId('responseInfo');
                    if (responseInfo) {
                        responseInfo.innerHTML = `
                            状态码: 101 Switching Protocols<br>
                            响应时间: 持续连接中<br>
                            内容类型: websocket<br>
                        `;
                        responseInfo.className = 'response-info httpStatus1';
                        responseInfo.dataset.status = '101';
                        responseInfo.dataset.statusText = 'Switching Protocols';
                        responseInfo.dataset.duration = '';
                        responseInfo.dataset.contentType = 'websocket';
                    }
                }
                saveRequestToHistory();
            };

            ws.onmessage = function (e) {
                // 处理WS响应头
                try {
                    if (typeof e.data === 'string') {
                        const obj = JSON.parse(e.data);
                        if (obj.type === 'headers' && obj.headers) {
                            // 【关键】保存响应头到发起请求的Tab
                            const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                            if (tab) {
                                tab.response.headers = obj.headers;
                            }
                            // 只有在同一个Tab时才更新界面
                            if (RequestTabManager.activeTabId === currentTabId) {
                                updateWSResponseHeaders(obj.headers);
                            }
                            return;
                        }
                    }

                } catch (err) {
                    console.warn('解析WS响应头失败:', err);
                }

                // 处理普通消息
                const responseBody = byId('responseBody');

                // 获取当前Tab并更新响应体
                const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);

                // 只有在同一个Tab时才更新界面
                if (RequestTabManager.activeTabId !== currentTabId) {
                    // 不在当前Tab时，只更新Tab的响应体，不更新界面
                    if (tab && tab.response) {
                        if (typeof e.data === 'string') {
                            tab.response.body = (tab.response.body || '') + e.data + '\n';
                        } else {
                            tab.response.body = (tab.response.body || '') + '[Binary data]\n';
                        }
                    }
                    return;
                }

                if (!responseBody) return;

                if (typeof e.data === 'string') {
                    // 文本消息
                    responseBody.value += e.data + '\n';

                    // 同步更新Tab的响应体
                    if (tab && tab.response) {
                        tab.response.body = responseBody.value || '';
                    }
                } else if (e.data instanceof Blob) {
                    // Blob 类型，转为 base64 或 hex 或 utf-8 字符串
                    const reader = new FileReader();
                    reader.onload = function () {
                        // 你可以选择显示为 base64、hex 或 utf-8
                        // 这里是 base64
                        /*
                        const base64 = btoa(
                            new Uint8Array(reader.result)
                                .reduce((data, byte) => data + String.fromCharCode(byte), '')
                        );
                        responseBody.value += '[Blob] base64: ' + base64 + '\n';
                        */
                        responseBody.value += '[Blob] data\n';

                        // 同步更新Tab的响应体
                        const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                        if (tab && tab.response) {
                            tab.response.body = responseBody.value || '';
                        }
                    };
                    reader.readAsArrayBuffer(e.data);
                } else if (e.data instanceof ArrayBuffer) {
                    // ArrayBuffer 类型，转为 hex 或 base64
                    /*
                    const arr = new Uint8Array(e.data);
                    const hex = Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join(' ');
                    responseBody.value += '[ArrayBuffer] hex: ' + hex + '\n';
                    */
                    responseBody.value += '[ArrayBuffer] data\n';

                    // 同步更新Tab的响应体
                    const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                    if (tab && tab.response) {
                        tab.response.body = responseBody.value || '';
                    }
                } else {
                    responseBody.value += '[Unknown WS message type]\n';

                    // 同步更新Tab的响应体
                    const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                    if (tab && tab.response) {
                        tab.response.body = responseBody.value || '';
                    }
                }
            };

            ws.onerror = function (e) {
                // 计算连接持续时间
                const duration = Date.now() - connectionStartTime;
                // 【关键】先更新Tab的响应数据
                const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                if (tab) {
                    tab.response.statusText = 'WebSocket 错误';
                    tab.response.duration = duration;
                }
                // 只有在同一个Tab时才更新界面
                if (RequestTabManager.activeTabId === currentTabId) {
                    const responseInfo = byId('responseInfo');
                    if (responseInfo) {
                        responseInfo.innerHTML = `
                            状态码: 101 WebSocket 错误<br>
                            响应时间: ${duration}ms<br>
                            内容类型: websocket<br>
                        `;
                    }
                }
            };

            ws.onclose = function () {
                // 计算连接持续时间
                const duration = Date.now() - connectionStartTime;
                // 【关键】先更新Tab的响应数据
                const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
                if (tab) {
                    tab.response.statusText = '连接已关闭';
                    tab.response.duration = duration;
                }
                // 只有在同一个Tab时才更新界面
                if (RequestTabManager.activeTabId === currentTabId) {
                    const responseInfo = byId('responseInfo');
                    if (responseInfo) {
                        responseInfo.innerHTML = `
                            状态码: 101 连接已关闭<br>
                            响应时间: ${duration}ms<br>
                            内容类型: websocket<br>
                        `;
                    }
                }
                // 清除发起请求的Tab的ws引用
                if (tab && tab.ws === ws) {
                    tab.ws = null;
                }
            };

            // 绑定发送/关闭按钮
            bindWSButtons(ws);
        }

        /**
         * 建立SSE连接
         * @param {string} connect_id - 连接ID
         * @param {string} currentTabId - 发起请求的Tab ID
         * @returns {Promise<void>}
         */
        async function establishSSEConnection(connect_id, currentTabId) {
            const sseUrl = `/api/forward-sse?connect_id=${connect_id}`;
            const es = new EventSource(sseUrl);

            // 记录连接开始时间
            const connectionStartTime = Date.now();

            // 保存到发起请求的Tab
            const tab = RequestTabManager.tabs.find(t => t.id === currentTabId);
            if (tab) {
                tab.sse = es;
                // 【关键】设置Tab的响应状态，确保切换Tab时不会被清空
                tab.response.status = 200;
